<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Για υπολογιστές) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 300px;
      box-sizing: border-box;
    }

    label {
      color: #dfb76c;
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #locationSelect {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    #locationSelect:focus {
      border-color: #dfb76c;
    }

    optgroup {
      background: #222;
      color: #dfb76c;
    }

    option {
      color: #fff;
      background: #1a1a1a;
    }

    /* AUDIO PLAYER */
    .audio-player-container {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      margin-top: 15px;
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ (Sidebar για υπολογιστές) */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease, bottom 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
      padding: 5px;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
      padding-right: 20px;
    }

    #infoImage {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    #infoCaption {
      font-size: 15px;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
      margin-top: 15px;
      background: #222;
      padding: 12px;
      border-left: 4px solid #dfb76c;
      border-radius: 0 6px 6px 0;
    }

    /* ΡΥΘΜΙΣΕΙΣ ΓΙΑ ΚΙΝΗΤΑ */
    @media screen and (max-width: 768px) {
      #menuContainer {
        top: 10px;
        left: 5%;
        width: 90%;
        padding: 10px;
        box-shadow: 0px 2px 10px rgba(0,0,0,0.5);
      }

      label {
        font-size: 11px;
        margin-bottom: 4px;
      }

      #locationSelect {
        padding: 8px;
        font-size: 15px;
      }

      .audio-player-container {
        margin-top: 8px;
        padding: 5px;
      }

      #customInfoBox {
        top: auto;
        right: 0 !important;
        bottom: -100%;
        left: 0;
        width: 100%;
        max-height: 50vh;
        border-radius: 12px 12px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
        box-shadow: 0px -5px 20px rgba(0,0,0,0.6);
        padding: 15px;
      }

      #customInfoBox.active {
        bottom: 0;
      }

      #infoTitle {
        font-size: 18px;
        margin-top: 5px;
        margin-bottom: 10px;
      }

      #infoImage {
        max-height: 200px;
      }

      #infoCaption {
        font-size: 13px;
        padding: 10px;
      }
      
      #closeBtn {
        top: 10px;
        right: 10px;
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div id="menuContainer">
    <label for="locationSelect">Πλοήγηση στο Άγιο Όρος</label>
    <select id="locationSelect">
      <option value="" disabled selected>Επιλέξτε προορισμό...</option>

      <optgroup label="ΣΚΗΤΕΣ">
        <option value="agias_annis">Σκήτη Αγίας Άννης</option>
        <option value="mikra_agia_anna">Μικρά Αγία Άννα</option>
        <option value="kafsokalyvia">Καυσοκαλύβια</option>
        <option value="provata">Σκήτη Προβάτα</option>
        <option value="agiou_dimitriou">Σκήτη Αγίου Δημητρίου</option>
        <option value="agiou_andrea">Σκήτη Αγίου Ανδρέα (Σεράι)</option>
        <option value="timiou_prodromou">Σκήτη Τιμίου Προδρόμου</option>

        <option value="agias_triados">Σκήτη Αγίας Τριάδος</option>
        <option value="nea_skiti">Νέα Σκήτη</option>
        <option value="evaggelismou_xenof">Σκήτη Ευαγγελισμού (Ξενοφώντος)</option>
        <option value="agiou_panteleimonos_kout">Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)</option>
        <option value="evaggelismou_filoth">Σκήτη Ευαγγελισμού (Φιλοθέου)</option>
      </optgroup>
    </select>

    <div class="audio-player-container">
      <label style="color: #aaa; font-size: 11px;">Μουσική Υπόκρουση</label>
      <audio id="bgAudio" controls loop>
        <source src="ixoi/psalmwdia.mp3" type="audio/mpeg">
        Ο browser σας δεν υποστηρίζει ήχο.
      </audio>
    </div>
  </div>

  <div id="customInfoBox">
    <button id="closeBtn">&times;</button>
    <h2 id="infoTitle">Όνομα Τοποθεσίας</h2>
    <img id="infoImage" src="" alt="" />
    <p id="infoCaption">Λεζάντα Φωτογραφίας...</p>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      animation: false,
      timeline: false,
      sceneModePicker: false,
      infoBox: false,
      selectionIndicator: false
    });

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(24.2300, 40.2300, 22000),
      orientation: { heading: Cesium.Math.toRadians(0.0), pitch: Cesium.Math.toRadians(-50.0), roll: 0.0 }
    });

    // Η Βάση Δεδομένων διορθωμένη και ενοποιημένη
    const locations = {
      "general": { lon: 24.230000, lat: 40.230000, height: 22000, pitch: -50.0, heading: 0.0 },
      
      // ΜΟΝΕΣ
      "megistis_lavras": { lon: 24.382442, lat: 40.170425, height: 600, pitch: -25.0, heading: 270.0, name: "Ι.Μ. Μεγίστης Λαύρας", folder: "lavra", caption: "Άποψη του καθολικού και της εσωτερικής αυλής της Μονής κατά την πρωινή είσοδο." },
      "vatopediou": { lon: 24.210847, lat: 40.321111, height: 700, pitch: -30.0, heading: 180.0, name: "Ι.Μ. Βατοπαιδίου", folder: "vatopedi", caption: "Λεζάντα για τη Μονή Βατοπαιδίου." },
      "iviron": { lon: 24.285214, lat: 40.245417, height: 600, pitch: -25.0, heading: 290.0, name: "Ι.Μ. Ιβήρων", folder: "iviron", caption: "Λεζάντα για τη Μονή Ιβήρων." },
      "chilandariou": { lon: 24.119725, lat: 40.334444, height: 650, pitch: -30.0, heading: 45.0, name: "Ι.Μ. Χιλανδαρίου", folder: "chilandari", caption: "Λεζάντα για τη Μονή Χιλανδαρίου." },
      "dionysiou": { lon: 24.223889, lat: 40.168056, height: 600, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Διονυσίου", folder: "dionysiou", caption: "Λεζάντα για τη Μονή Διονυσίου." },
      "koutloumousiou": { lon: 24.248236, lat: 40.252631, height: 500, pitch: -30.0, heading: 0.0, name: "Ι.Μ. Κουτλουμουσίου", folder: "koutloumousi", caption: "Λεζάντα για τη Μονή Κουτλουμουσίου." },
      "pantokratoros": { lon: 24.266444, lat: 40.270139, height: 600, pitch: -25.0, heading: 250.0, name: "Ι.Μ. Παντοκράτορος", folder: "pantokrator", caption: "Λεζάντα για τη Μονή Παντοκράτορος." },
      "xiropotamou": { lon: 24.219444, lat: 40.237222, height: 550, pitch: -30.0, heading: 60.0, name: "Ι.Μ. Ξηροποτάμου", folder: "xiropotamou", caption: "Λεζάντα για τη Μονή Ξηροποτάμου." },
      "zografou": { lon: 24.160411, lat: 40.301753, height: 600, pitch: -30.0, heading: 130.0, name: "Ι.Μ. Ζωγράφου", folder: "zografou", caption: "Λεζάντα για τη Μονή Ζωγράφου." },
      "docheiariou": { lon: 24.173644, lat: 40.276431, height: 550, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Δοχειαρίου", folder: "docheiariou", caption: "Λεζάντα για τη Μονή Δοχειαρίου." },
      "karakallou": { lon: 24.308236, lat: 40.224158, height: 600, pitch: -25.0, heading: 300.0, name: "Ι.Μ. Καρακάλλου", folder: "karakallou", caption: "Λεζάντα για τη Μονή Καρακάλλου." },
      "filotheou": { lon: 24.285414, lat: 40.229125, height: 600, pitch: -30.0, heading: 320.0, name: "Ι.Μ. Φιλοθέου", folder: "filotheou", caption: "Λεζάντα για τη Μονή Φιλοθέου." },
      "simonopetra": { lon: 24.246139, lat: 40.189139, height: 700, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Σίμωνος Πέτρας", folder: "simonopetra", caption: "Λεζάντα για τη Μονή Σίμωνος Πέτρας." },
      "agiou_pavlou": { lon: 24.256417, lat: 40.160833, height: 750, pitch: -25.0, heading: 20.0, name: "Ι.Μ. Αγίου Παύλου", folder: "agioupavlou", caption: "Λεζάντα για τη Μονή Αγίου Παύλου." },
      "stavronikita": { lon: 24.276419, lat: 40.260842, height: 550, pitch: -25.0, heading: 240.0, name: "Ι.Μ. Σταυρονικήτα", folder: "stavronikita", caption: "Λεζάντα για τη Μονή Σταυρονικήτα." },
      "xenofontos": { lon: 24.178611, lat: 40.242500, height: 550, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Ξενοφώντος", folder: "xenofontos", caption: "Λεζάντα για τη Μονή Ξενοφώντος." },
      "grigoriou": { lon: 24.255551, lat: 40.179354, height: 600, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Γρηγορίου", folder: "grigoriou", caption: "Λεζάντα για τη Μονή Γρηγορίου." },
      "esfigmenou": { lon: 24.137814, lat: 40.351425, height: 550, pitch: -25.0, heading: 180.0, name: "Ι.Μ. Εσφιγμένου", folder: "esfigmenou", caption: "Λεζάντα για τη Μονή Εσφιγμένου." },
      "agiou_panteleimonos": { lon: 24.200842, lat: 40.241431, height: 600, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Αγίου Παντελεήμονος", folder: "panteleimon", caption: "Λεζάντα για τη Μονή Αγίου Παντελεήμονος." },
      "konstamonitou": { lon: 24.174125, lat: 40.271714, height: 600, pitch: -30.0, heading: 120.0, name: "Ι.Μ. Κωνσταμονίτου", folder: "konstamonitou", caption: "Λεζάντα για τη Μονή Κωνσταμονίτου." },
      
      // ΣΚΗΤΕΣ
      "agias_annis": { lon: 24.296111, lat: 40.144444, height: 650, pitch: -25.0, heading: 45.0, name: "Σκήτη Αγίας Άννης", folder: "agiaanna", caption: "Λεζάντα για τη Σκήτη Αγίας Άννης." },
      "mikra_agia_anna": { lon: 24.303842, lat: 40.138814, height: 500, pitch: -25.0, heading: 30.0, name: "Μικρά Αγία Άννα", folder: "mikraanna", caption: "Λεζάντα για τη Μικρά Αγία Άννα." },
      "kafsokalyvia": { lon: 24.364425, lat: 40.133611, height: 600, pitch: -25.0, heading: 340.0, name: "Καυσοκαλύβια", folder: "kafsokalyvia", caption: "Λεζάντα για τα Καυσοκαλύβια." },
      "provata": { lon: 24.319741, lat: 40.241725, height: 600, pitch: -30.0, heading: 270.0, name: "Σκήτη Προβάτα", folder: "provata", caption: "Λεζάντα για τη Σκήτη Προβάτα." },
      "agiou_dimitriou": { lon: 24.236414, lat: 40.301425, height: 550, pitch: -30.0, heading: 180.0, name: "Σκήτη Αγίου Δημητρίου", folder: "agiosdimitrios", caption: "Λεζάντα για τη Σκήτη Αγίου Δημητρίου." },
      "agiou_andrea": { lon: 24.252536, lat: 40.260214, height: 500, pitch: -30.0, heading: 210.0, name: "Σκήτη Αγίου Ανδρέα (Σεράι)", folder: "agiosandreas", caption: "Λεζάντα για τη Σκήτη Αγίου Ανδρέα." },
      "timiou_prodromou": { lon: 24.316425, lat: 40.248611, height: 500, pitch: -25.0, heading: 270.0, name: "Σκήτη Τιμίου Προδρόμου", folder: "timiosprodromos", caption: "Λεζάντα για τη Σκήτη Τιμίου Προδρόμου." },
      "profiti_ilia": { lon: 24.249714, lat: 40.274125, height: 550, pitch: -25.0, heading: 160.0, name: "Σκήτη Προφήτου Ηλιού", folder: "profitisilias", caption: "Λεζάντα για τη Σκήτη Προφήτου Ηλιού." },
      "agias_triados": { lon: 24.123842, lat: 40.321411, height: 550, pitch: -30.0, heading: 45.0, name: "Σκήτη Αγίας Τριάδος", folder: "agiatriada", caption: "Λεζάντα για τη Σκήτη Αγίας Τριάδος." },
      "nea_skiti": { lon: 24.269411, lat: 40.147214, height: 600, pitch: -25.0, heading: 45.0, name: "Νέα Σκήτη", folder: "neaskiti", caption: "Λεζάντα για τη Νέα Σκήτη." },
      "evaggelismou_xenof": { lon: 24.194725, lat: 40.252814, height: 550, pitch: -30.0, heading: 90.0, name: "Σκήτη Ευαγγελισμού (Ξενοφώντος)", folder: "evaggelismos", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." },
      "agiou_panteleimonos_kout": { lon: 24.254714, lat: 40.244425, height: 500, pitch: -30.0, heading: 0.0, name: "Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)", folder: "panteleimon_kout", caption: "Λεζάντα για τη Σκήτη Αγίου Παντελεήμονος." },
      "evaggelismou_filoth": { lon: 24.311425, lat: 40.216411, height: 550, pitch: -30.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evaggelismos_fil", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." }
    

    // Αυτόματη δημιουργία Πινεζών (Markers)
    for (const key in locations) {
      if (key === "general") continue;
      
      const loc = locations[key];
      const isSkiti = loc.name.includes("Σκήτη") || loc.name.includes("Μικρά") || loc.name.includes("Καυσοκαλύβια");
      const markerColor = isSkiti ? Cesium.Color.DODGERBLUE : Cesium.Color.RED;

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND 
        },
        name: loc.name
      });

      entity.locationKey = key;
    }

    // ΣΥΝΑΡΤΗΣΗ ΕΜΦΑΝΙΣΗΣ ΦΩΤΟΓΡΑΦΙΑΣ
    function showLocationInfo(key) {
      const data = locations[key];

      if (!data || key === "general") {
        document.getElementById('customInfoBox').classList.remove('active');
        return;
      }

      document.getElementById('infoTitle').innerText = data.name;
      document.getElementById('infoImage').src = `fotografies/${data.folder}/${data.folder}_1.jpg`;
      document.getElementById('infoImage').alt = data.name;
      document.getElementById('infoCaption').innerText = data.caption;

      document.getElementById('customInfoBox').classList.add('active');
    }

    // 1. LEFT CLICK πάνω σε ΠΙΝΕΖΑ
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          const target = locations[entity.locationKey];
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
            orientation: { heading: Cesium.Math.toRadians(target.heading), pitch: Cesium.Math.toRadians(target.pitch), roll: 0.0 },
            duration: 2.5
          });
          document.getElementById('locationSelect').value = entity.locationKey;
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // 2. ΑΛΛΑΓΗ ΑΠΟ ΤΟ DROPDOWN ΜΕΝΟΥ
    document.getElementById('locationSelect').addEventListener('change', function() {
      const value = this.value;
      const target = locations[value];
      if (target) {
        showLocationInfo(value);
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
          orientation: { heading: Cesium.Math.toRadians(target.heading), pitch: Cesium.Math.toRadians(target.pitch), roll: 0.0 },
          duration: 3.5
        });
      }
    });

    // 3. ΚΟΥΜΠΙ ΚΛΕΙΣΙΜΑΤΟΣ (X)
    document.getElementById('closeBtn').addEventListener('click', function() {
