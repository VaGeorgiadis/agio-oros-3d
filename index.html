<!DOCTYPE html>

<head>

  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }

    /* Στυλ για το Μενού Επιλογής */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.9);
      padding: 12px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #444;
    }

    label {
      color: #dfb76c; /* Βυζαντινό χρυσό χρώμα για το κείμενο */
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #locationSelect {
      width: 280px;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      outline: none;
    }

    #locationSelect:focus {
      border-color: #dfb76c;
    }
  </style>
</head>
