<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΑΡΧΙΚΗ ΟΘΟΝΗ ΥΠΟΔΟΧΗΣ (SPLASH SCREEN) */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      background: #0c1219 url('intro.jpg') no-repeat center center;
      background-size: contain;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
    }

    /* ΚΕΝΤΡΙΚΟΣ ΤΙΤΛΟΣ ΑΡΧΙΚΗΣ ΟΘΟΝΗΣ */
    #mainAppTitle {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100000; 
      background: rgba(20, 20, 20, 0.85);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 12px 30px;
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1.5px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ΚΟΥΜΠΙ ΓΙΑ ΑΝΟΙΓΜΑ ΤΟΥ ΜΕΝΟΥ */
    #menuToggleBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(30, 30, 30, 0.95);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      transition: background 0.3s;
    }

    #menuToggleBtn:hover {
      background: #2a2a2a;
    }

    /* ΑΥΤΟΝΟΜΟ ΚΟΥΜΠΙ ΕΠΑΝΑΦΟΡΑΣ ΜΕ ΤΟ INTROSMALL.JPG */
    #homeFlyBtn {
      position: absolute;
      top: 75px;
      left: 20px;
      z-index: 999;
      width: 50px;
      height: 50px;
      background: #111 url('introsmall.jpg') no-repeat center center;
      background-size: cover;
      border: 1px solid #dfb76c;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      transition: transform 0.2s, border-color 0.3s;
    }

    #homeFlyBtn:hover {
      transform: scale(1.05);
      border-color: #fff;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Slide-out) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: -350px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 320px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
      transition: left 0.4s ease;
    }

    #menuContainer.active {
      left: 20px;
    }

    .menu-header {
      color: #dfb76c;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
      padding-right: 25px;
    }

    #closeMenuBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
    }

    #closeMenuBtn:hover {
      color: #dfb76c;
    }

    .accordion-btn {
      width: 100%;
      background: #222;
      color: #dfb76c;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 5px;
      outline: none;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
    }

    .accordion-btn:hover {
      background: #2a2a2a;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      margin-bottom: 5px;
    }

    .accordion-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    .audio-player-container {
      background: #1a1a1a;
      padding: 8px;
      border-radius: 6px;
      margin-top: 10px;
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease, bottom 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .display-container {
      position: relative;
      width: 100%;
      height: 350px;
      background: #111;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      border: 1px solid #333;
    }

    .scroll-gallery {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 10px;
      padding: 10px;
      box-sizing: border-box;
    }

    .scroll-gallery::-webkit-scrollbar {
      width: 6px;
    }
    .scroll-gallery::-webkit-scrollbar-thumb {
      background: #dfb76c;
      border-radius: 10px;
    }
    .scroll-gallery::-webkit-scrollbar-track {
      background: #222;
    }

    .scroll-gallery img {
      width: 100%;
      height: auto;
      max-height: 330px;
      object-fit: contain;
      cursor: zoom-in;
      display: block;
      border-radius: 4px;
      border: 1px solid #222;
      background: #050505;
    }

    .text-content-box {
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      font-size: 15px;
      line-height: 1.6;
      color: #eee;
      overflow-y: auto;
      background: rgba(15, 15, 15, 0.95);
      display: none;
    }

    #infoCaption {
      font-size: 13px;
      font-style: italic;
      color: #aaa;
      margin-top: 8px;
      margin-bottom: 0;
      text-align: center;
    }

    .info-tabs {
      display: flex;
      margin-top: 15px;
      gap: 5px;
    }

    .tab-btn {
      flex: 1;
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #444;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.3s;
      border-radius: 4px;
    }

    .tab-btn:hover {
      color: #dfb76c;
      background: #252525;
    }

    .tab-btn.active {
      background: #dfb76c;
      color: #000;
      border-color: #dfb76c;
    }

    /* LIGHTBOX */
    #imageLightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    #lightboxImg {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border: 1px solid #444;
      border-radius: 4px;
    }

    /* RESPONSIVENESS ΓΙΑ ΚΙΝΗΤΑ */
    @media screen and (max-width: 768px) {
      #mainAppTitle {
        top: 15%; 
        font-size: 18px; 
        padding: 8px 16px;
        max-width: 90%;
        border-radius: 6px;
        background: rgba(20, 20, 20, 0.95);
      }
      #menuToggleBtn {
        position: relative; top: 0; left: 0; display: block; width: 90%; margin: 0 auto 5px auto;
        padding: 10px; font-size: 13px; text-align: center; border-radius: 0 0 6px 6px;
        background: rgba(30, 30, 30, 0.95); box-shadow: none;
      }
      #homeFlyBtn {
        position: absolute; 
        top: 15px; 
        left: 15px; 
        margin: 0;
        width: 35px; 
        height: 35px; 
        border-radius: 50%;
        box-shadow: 0px 2px 10px rgba(0,0,0,0.5);
        z-index: 1002;
      }
      #menuContainer { top: 115px; left: -100%; width: 90%; padding: 12px; max-height: 65vh; }
      #menuContainer.active { left: 5%; }
      .accordion-btn { padding: 10px; font-size: 13px; }
      #customInfoBox { top: auto; right: 0 !important; bottom: -100%; left: 0; width: 100%; max-height: 65vh; border-radius: 12px 12px 0 0; padding: 15px; }
      #customInfoBox.active { bottom: 0; }
      .display-container { height: 180px; }
      .scroll-gallery img { max-height: 160px; }
      .text-content-box { font-size: 13px; padding: 12px; }
      .tab-btn { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

      "agiou_panteleimonos_kout": { lon: 24.258978, lat: 40.253387, height: 900, pitch: -60.0, heading: 0.0, name: "Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)", folder: "skitipantel" },
      "evaggelismou_filoth": { lon: 24.199945, lat: 40.252755, height: 900, pitch: -60.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evagelfiloth" }
    };

    // ΣΥΝΑΡΤΗΣΗ ΔΗΜΙΟΥΡΓΙΑΣ PREMIUM ΚΑΘΑΡΟΥ ΠΛΑΙΣΙΟΥ (HIGH-DPI ΜΕ ΜΕΤΑΤΡΟΠΗ ΣΕ DATA URL)
    function createCustomLabelCanvas(text, borderColorHex) {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      const fontSize = 28; // Αυξημένο μέγεθος για supersampling
      ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;
      const textWidth = ctx.measureText(text).width;
      
      const paddingX = 20;
      const paddingY = 12;
      
      canvas.width = Math.ceil(textWidth + paddingX * 2 + 10);
      canvas.height = Math.ceil(fontSize + paddingY * 2 + 10);
      
      ctx.font = `bold ${fontSize}px "Segoe UI", Arial, sans-serif`;
      ctx.textBaseline = 'top';
      
      const x = 5;
      const y = 5;
      const w = textWidth + paddingX * 2;
      const h = fontSize + paddingY * 2;
      const radius = 6; 
      
      // 1. Μαύρο Φόντο
      ctx.fillStyle = '#0a0a0a'; 
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(x, y, w, h, radius);
      } else {
        ctx.rect(x, y, w, h);
      }
      ctx.fill();
      
      // 2. Χρυσό/Πορφυρό Περίγραμμα
      ctx.strokeStyle = borderColorHex; 
      ctx.lineWidth = 4;           
      ctx.stroke();
      
      // 3. Γράμματα
      ctx.fillStyle = borderColorHex;   
      ctx.fillText(text, x + paddingX, y + paddingY);
      
      return canvas.toDataURL(); // Επιστρέφει εικόνα Base64 - Λύνει οριστικά το πρόβλημα rendering του Cesium
    }

    // ΔΗΜΙΟΥΡΓΙΑ ENTITIES ΜΕ ΟΛΕΣ ΤΙΣ ΠΙΝΕΖΕΣ ΟΡΑΤΕΣ ΚΑΙ ΔΙΟΡΘΩΜΕΝΟ SLANT-RANGE LOD
    for (const key in locations) {
      const loc = locations[key];
      
      let markerColor;
      let themeColorHex;
      let maxLabelDistance = 32000.0; // Default απόσταση για Χαμηλό Υψόμετρο (< 8.000μ)

      if (loc.name.includes("Ι.Μ.")) {
        themeColorHex = '#dfb76c'; // Χρυσό
        markerColor = Cesium.Color.fromCssColorString('#dfb76c');
        
        // 3 Κεντρικές Μονές ορατές από το Μέγιστο Ύψος (αρχική οθόνη), οι υπόλοιπες Μονές από Μεσαίο Υψόμετρο
        if (key === "megistis_lavras" || key === "vatopediou" || key === "iviron") {
          maxLabelDistance = 500000.0; // Πάντα ορατά στην αρχική οθόνη
        } else {
          maxLabelDistance = 95000.0;  // Μεσαίο υψόμετρο (ορατά μόλις ξεκινήσει το ζουμ)
        }
      } else if (loc.name.includes("Σκήτη") || loc.name.includes("Μικρά") || loc.name.includes("Καυσοκαλύβια")) {
        themeColorHex = '#800020'; // Πορφυρό
        markerColor = Cesium.Color.fromCssColorString('#800020');
        maxLabelDistance = 32000.0;  // Χαμηλό υψόμετρο (εμφανίζονται κοντά στο έδαφος)
      } else if (loc.name.includes("Διαδρομή") || loc.name.includes("Μονοπάτι")) {
        themeColorHex = '#1a73e8'; // Γαλάζιο
        markerColor = Cesium.Color.fromCssColorString('#1a73e8');
        maxLabelDistance = 32000.0;
      } else {
        themeColorHex = '#cd7f32'; // Χάλκινο
        markerColor = Cesium.Color.fromCssColorString('#cd7f32');
        maxLabelDistance = 32000.0;
      }

      const goldCanvasDataUrl = createCustomLabelCanvas(loc.name, themeColorHex);

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          // ΟΛΕΣ ΟΙ ΠΙΝΕΖΕΣ ΟΡΑΤΕΣ ΑΠΟ ΤΗΝ ΑΡΧΗ ΠΑΝΤΟΥ
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, 500000.0)
        },
        billboard: {
          image: goldCanvasDataUrl,
          scale: 0.5, // Anti-aliasing για κρυστάλλινη εμφάνιση χωρίς pixels
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -15), // Αγκύρωση ακριβώς πάνω από την πινέζα
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, maxLabelDistance),
          disableDepthTestDistance: Number.POSITIVE_INFINITY 
        },
        name: loc.name
      });
      entity.locationKey = key;
    }

    function flyToLocation(target) {
      const targetCenter = Cesium.Cartesian3.fromDegrees(target.lon, target.lat);
      const boundingSphere = new Cesium.BoundingSphere(targetCenter, 0.0);
      const headingRad = Cesium.Math.toRadians(target.heading);
      const pitchRad = Cesium.Math.toRadians(target.pitch);

      viewer.camera.flyToBoundingSphere(boundingSphere, {
        offset: new Cesium.HeadingPitchRange(headingRad, pitchRad, target.height),
        duration: 3.0
      });
    }

    let currentFolder = "";

    function showLocationInfo(key) {
      const data = locations[key];
      if (!data) return;

      currentFolder = data.folder;
      document.getElementById('infoTitle').innerText = data.name;

      const galleryContainer = document.getElementById('galleryLayer');
      galleryContainer.innerHTML = ""; 

      for (let imgIndex = 1; imgIndex <= 30; imgIndex++) {
        const imgSrc = `fotografies/${currentFolder}/${currentFolder}_${imgIndex}.jpg`;
        const tempImg = new Image();
        tempImg.src = imgSrc;

        tempImg.onload = function() {
          const newImg = document.createElement('img');
          newImg.src = imgSrc;
          newImg.alt = `${data.name} - Εικόνα ${imgIndex}`;
          newImg.onclick = function() { openLightbox(this); };
          galleryContainer.appendChild(newImg);
        };
      }

      galleryContainer.scrollTop = 0;
      switchTab('media');
      document.getElementById('customInfoBox').classList.add('active');
    }

    function switchTab(type) {
      const tabMedia = document.getElementById('tabMedia');
      const tabIstoria = document.getElementById('tabIstoria');
      const tabParadosi = document.getElementById('tabParadosi');
      
      const galleryLayer = document.getElementById('galleryLayer');
      const textLayer = document.getElementById('textLayer');
      const captionElement = document.getElementById('infoCaption');

      tabMedia.classList.remove('active');
      tabIstoria.classList.remove('active');
      tabParadosi.classList.remove('active');

      if (type === 'media') {
        tabMedia.classList.add('active');
        galleryLayer.style.display = 'flex'; 
        textLayer.style.display = 'none';    
        captionElement.innerText = "Κυλίστε κάθετα για να δείτε όλες τις φωτογραφίες";
      } 
      else {
        if (type === 'istoria') tabIstoria.classList.add('active');
        if (type === 'paradosi') tabParadosi.classList.add('active');
        
        galleryLayer.style.display = 'none'; 
        textLayer.style.display = 'block';   
        textLayer.innerText = "Φόρτωση κειμένου...";
        captionElement.innerText = (type === 'istoria') ? "Ιστορικό Σημείωμα" : "Ιερά Παράδοση & Κειμήλια";

        if (!currentFolder) return;

        const textFileUrl = `keimena/${currentFolder}/${type}.txt`;
        fetch(textFileUrl)
          .then(response => {
            if (!response.ok) throw new Error();
            return response.text();
          })
          .then(text => {
            textLayer.innerHTML = text.replace(/\n/g, "<br>");
          })
          .catch(() => {
            if (type === 'istoria') {
              textLayer.innerHTML = `Εδώ θα εμφανίζονται τα <b>ιστορικά στοιχεία</b> για την τοποθεσία: <i>${document.getElementById('infoTitle').innerText}</i>.`;
            } else {
              textLayer.innerHTML = `Εδώ θα εμφανίζονται οι <b>ιερές παραδόσεις</b> για την τοποθεσία: <i>${document.getElementById('infoTitle').innerText}</i>.`;
            }
          });
      }
    }

    function openLightbox(imgElement) {
      if (!imgElement || !imgElement.src) return;
      document.getElementById('lightboxImg').src = imgElement.src;
      document.getElementById('imageLightbox').style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('imageLightbox').style.display = 'none';
    }

    function toggleAccordion(id) {
      const contents = document.getElementsByClassName('accordion-content');
      for (let i = 0; i < contents.length; i++) {
        if (contents[i].id !== id) {
          contents[i].style.maxHeight = null; 
        }
      }
      const current = document.getElementById(id);
      if (current.style.maxHeight) {
        current.style.maxHeight = null;
      } else {
        current.style.maxHeight = current.scrollHeight + "px"; 
      }
    }

    function clearSelects() {
      document.getElementById('monasterySelect').selectedIndex = -1;
      document.getElementById('skiteSelect').selectedIndex = -1;
      document.getElementById('routeSelect').selectedIndex = -1;
    }

    document.getElementById('monasterySelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('skiteSelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    document.getElementById('skiteSelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('monasterySelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          flyToLocation(locations[entity.locationKey]);
          
          clearSelects();
          if (document.querySelector(`#monasterySelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('monasterySelect').value = entity.locationKey;
          } else if (document.querySelector(`#skiteSelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('skiteSelect').value = entity.locationKey;
          }
          
          const menu = document.getElementById('menuContainer');
          if (menu.classList.contains('active')) {
            toggleMenu();
          }
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    document.getElementById('closeBtn').addEventListener('click', function() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
    });
  </script>
