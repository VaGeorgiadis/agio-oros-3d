<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Πλοήγηση + Μουσική μαζί για να είναι ευκρινή) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 300px;
    }

    label {
      color: #dfb76c;
      font-size: 13px;
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #locationSelect {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    #locationSelect:focus {
      border-color: #dfb76c;
    }

    optgroup {
      background: #222;
      color: #dfb76c;
    }

    option {
      color: #fff;
      background: #1a1a1a;
    }

    /* ΝΕΟ ΣΤΥΛ ΓΙΑ ΤΟΝ ΚΕΝΤΡΙΚΟ AUDIO PLAYER */
    .audio-player-container {
      background: #222;
      padding: 10px;
      border-radius: 6px;
      margin-top: 15px; /* Απόσταση κάτω από το dropdown */
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* CUSTOM ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ (SIDEBAR) - ΧΩΡΙΣ ΗΧΟ ΠΛΕΟΝ */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    #infoImage {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    #infoCaption {
      font-size: 15px;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
      margin-top: 15px;
      background: #222;
      padding: 12px;
      border-left: 4px solid #dfb76c;
      border-radius: 0 6px 6px 0;
    }
  </style>
</head>
<body>

  <div id="menuContainer">
    <label for="locationSelect">Πλοήγηση στο Άγιο Όρος</label>
    <select id="locationSelect">
      <option value="" disabled selected>Επιλέξτε προορισμό...</option>
      <option value="general">-- Γενική Άποψη Χερσονήσου --</option>
      
      <optgroup label="ΙΕΡΕΣ ΜΟΝΕΣ">
        <option value="megistis_lavras">Ι.Μ. Μεγίστης Λαύρας</option>
        <option value="vatopediou">Ι.Μ. Βατοπαιδίου</option>
        <option value="iviron">Ι.Μ. Ιβήρων</option>
        <option value="chilandariou">Ι.Μ. Χιλανδαρίου</option>
        <option value="dionysiou">Ι.Μ. Διονυσίου</option>
        <option value="koutloumousiou">Ι.Μ. Κουτλουμουσίου</option>
        <option value="pantokratoros">Ι.Μ. Παντοκράτορος</option>
        <option value="xiropotamou">Ι.Μ. Ξηροποτάμου</option>
        <option value="zografou">Ι.Μ. Ζωγράφου</option>
        <option value="docheiariou">Ι.Μ. Δοχειαρίου</option>
        <option value="karakallou">Ι.Μ. Καρακάλλου</option>
        <option value="filotheou">Ι.Μ. Φιλοθέου</option>
        <option value="simonopetra">Ι.Μ. Σίμωνος Πέτρας</option>
        <option value="agiou_pavlou">Ι.Μ. Αγίου Παύλου</option>
        <option value="stavronikita">Ι.Μ. Σταυρονικήτα</option>
        <option value="xenofontos">Ι.Μ. Ξενοφώντος</option>
        <option value="grigoriou">Ι.Μ. Γρηγορίου</option>
        <option value="esfigmenou">Ι.Μ. Εσφιγμένου</option>
        <option value="agiou_panteleimonos">Ι.Μ. Αγίου Παντελεήμονος</option>
        <option value="konstamonitou">Ι.Μ. Κωνσταμονίτου</option>
      </optgroup>

      <optgroup label="ΣΚΗΤΕΣ">
        <option value="agias_annis">Σκήτη Αγίας Άννης</option>
        <option value="mikra_agia_anna">Μικρά Αγία Άννα</option>
        <option value="kafsokalyvia">Καυσοκαλύβια</option>
        <option value="provata">Σκήτη Προβάτα</option>
        <option value="agiou_dimitriou">Σκήτη Αγίου Δημητρίου</option>
        <option value="agiou_andrea">Σκήτη Αγίου Ανδρέα (Σεράι)</option>
        <option value="timiou_prodromou">Σκήτη Τιμίου Προδρόμου</option>
        <option value="profiti_ilia">Σκήτη Προφήτου Ηλιού</option>
        <option value="agias_triados">Σκήτη Αγίας Τριάδος</option>
        <option value="nea_skiti">Νέα Σκήτη</option>
        <option value="evaggelismou_xenof">Σκήτη Ευαγγελισμού (Ξενοφώντος)</option>
        <option value="agiou_panteleimonos_kout">Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)</option>
        <option value="evaggelismou_filoth">Σκήτη Ευαγγελισμού (Φιλοθέου)</option>
      </optgroup>
    </select>

    <div class="audio-player-container">
      <label style="color: #aaa; font-size: 11px;">Μουσική Υπόκρουση</label>
      <audio id="bgAudio" controls loop>
        <source src="ixoi/psalmwdia.mp3" type="audio/mpeg">
        Ο browser σας δεν υποστηρίζει ήχο.
      </audio>
    </div>
  </div>

  <div id="customInfoBox">
    <button id="closeBtn">&times;</button>
    <h2 id="infoTitle">Όνομα Τοποθεσίας</h2>
    <img id="infoImage" src="" alt="" />
    <p id="infoCaption">Λεζάντα Φωτογραφίας...</p>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // ⚠️ ΒΑΛΕ ΤΟ TOKEN ΣΟΥ ΑΝΑΜΕΣΑ ΣΤΑ ΕΙΣΑΓΩΓΙΚΑ ΚΑΤΩ:
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      animation: false,
      timeline: false,
      sceneModePicker: false,
      infoBox: false,
      selectionIndicator: false
    });

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(24.2300, 40.2300, 22000),
      orientation: { heading: Cesium.Math.toRadians(0.0), pitch: Cesium.Math.toRadians(-50.0), roll: 0.0 }
    });

    // Βάση Δεδομένων
    const locations = {
      "general": { lon: 24.2300, lat: 40.2300, height: 22000, pitch: -50.0, heading: 0.0 },
      "megistis_lavras": { lon: 24.3824, lat: 40.1704, height: 600, pitch: -25.0, heading: 270.0, name: "Ι.Μ. Μεγίστης Λαύρας", folder: "lavra", caption: "Άποψη του καθολικού και της εσωτερικής αυλής της Μονής κατά την πρωινή είσοδο." },
      "vatopediou": { lon: 24.2108, lat: 40.3211, height: 700, pitch: -30.0, heading: 180.0, name: "Ι.Μ. Βατοπαιδίου", folder: "vatopedi", caption: "Λεζάντα για τη Μονή Βατοπαιδίου." },
      "iviron": { lon: 24.2852, lat: 40.2454, height: 600, pitch: -25.0, heading: 290.0, name: "Ι.Μ. Ιβήρων", folder: "iviron", caption: "Λεζάντα για τη Μονή Ιβήρων." },
      "chilandariou": { lon: 24.1197, lat: 40.3344, height: 650, pitch: -30.0, heading: 45.0, name: "Ι.Μ. Χιλανδαρίου", folder: "chilandari", caption: "Λεζάντα για τη Μονή Χιλανδαρίου." },
      "dionysiou": { lon: 24.2238, lat: 40.1681, height: 600, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Διονυσίου", folder: "dionysiou", caption: "Λεζάντα για τη Μονή Διονυσίου." },
      "koutloumousiou": { lon: 24.2482, lat: 40.2526, height: 500, pitch: -30.0, heading: 0.0, name: "Ι.Μ. Κουτλουμουσίου", folder: "koutloumousi", caption: "Λεζάντα για τη Μονή Κουτλουμουσίου." },
      "pantokratoros": { lon: 24.2664, lat: 40.2701, height: 600, pitch: -25.0, heading: 250.0, name: "Ι.Μ. Παντοκράτορος", folder: "pantokrator", caption: "Λεζάντα για τη Μονή Παντοκράτορος." },
      "xiropotamou": { lon: 24.2194, lat: 40.2372, height: 550, pitch: -30.0, heading: 60.0, name: "Ι.Μ. Ξηροποτάμου", folder: "xiropotamou", caption: "Λεζάντα για τη Μονή Ξηροποτάμου." },
      "zografou": { lon: 24.1604, lat: 40.3017, height: 600, pitch: -30.0, heading: 130.0, name: "Ι.Μ. Ζωγράφου", folder: "zografou", caption: "Λεζάντα για τη Μονή Ζωγράφου." },
      "docheiariou": { lon: 24.1736, lat: 40.2764, height: 550, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Δοχειαρίου", folder: "docheiariou", caption: "Λεζάντα για τη Μονή Δοχειαρίου." },
      "karakallou": { lon: 24.3082, lat: 40.2241, height: 600, pitch: -25.0, heading: 300.0, name: "Ι.Μ. Καρακάλλου", folder: "karakallou", caption: "Λεζάντα για τη Μονή Καρακάλλου." },
      "filotheou": { lon: 24.2854, lat: 40.2291, height: 600, pitch: -30.0, heading: 320.0, name: "Ι.Μ. Φιλοθέου", folder: "filotheou", caption: "Λεζάντα για τη Μονή Φιλοθέου." },
      "simonopetra": { lon: 24.2461, lat: 40.1891, height: 700, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Σίμωνος Πέτρας", folder: "simonopetra", caption: "Λεζάντα για τη Μονή Σίμωνος Πέτρας." },
      "agiou_pavlou": { lon: 24.2564, lat: 40.1608, height: 750, pitch: -25.0, heading: 20.0, name: "Ι.Μ. Αγίου Παύλου", folder: "agioupavlou", caption: "Λεζάντα για τη Μονή Αγίου Παύλου." },
      "stavronikita": { lon: 24.2764, lat: 40.2608, height: 550, pitch: -25.0, heading: 240.0, name: "Ι.Μ. Σταυρονικήτα", folder: "stavronikita", caption: "Λεζάντα για τη Μονή Σταυρονικήτα." },
      "xenofontos": { lon: 24.1786, lat: 40.2425, height: 550, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Ξενοφώντος", folder: "xenofontos", caption: "Λεζάντα για τη Μονή Ξενοφώντος." },
      "grigoriou": { lon: 24.2341, lat: 40.1794, height: 600, pitch: -25.0, heading: 45.0, name: "Ι.Μ. Γρηγορίου", folder: "grigoriou", caption: "Λεζάντα για τη Μονή Γρηγορίου." },
      "esfigmenou": { lon: 24.1378, lat: 40.3514, height: 550, pitch: -25.0, heading: 180.0, name: "Ι.Μ. Εσφιγμένου", folder: "esfigmenou", caption: "Λεζάντα για τη Μονή Εσφιγμένου." },
      "agiou_panteleimonos": { lon: 24.2008, lat: 40.2414, height: 600, pitch: -25.0, heading: 90.0, name: "Ι.Μ. Αγίου Παντελεήμονος", folder: "panteleimon", caption: "Λεζάντα για τη Μονή Αγίου Παντελεήμονος." },
      "konstamonitou": { lon: 24.1741, lat: 40.2717, height: 600, pitch: -30.0, heading: 120.0, name: "Ι.Μ. Κωνσταμονίτου", folder: "konstamonitou", caption: "Λεζάντα για τη Μονή Κωνσταμονίτου." },
      
      // Σκήτες
      "agias_annis": { lon: 24.2961, lat: 40.1444, height: 650, pitch: -25.0, heading: 45.0, name: "Σκήτη Αγίας Άννης", folder: "agiaanna", caption: "Λεζάντα για τη Σκήτη Αγίας Άννης." },
      "mikra_agia_anna": { lon: 24.3038, lat: 40.1388, height: 500, pitch: -25.0, heading: 30.0, name: "Μικρά Αγία Άννα", folder: "mikraanna", caption: "Λεζάντα για τη Μικρά Αγία Άννα." },
      "kafsokalyvia": { lon: 24.3644, lat: 40.1336, height: 600, pitch: -25.0, heading: 340.0, name: "Καυσοκαλύβια", folder: "kafsokalyvia", caption: "Λεζάντα για τα Καυσοκαλύβια." },
      "provata": { lon: 24.3197, lat: 40.2417, height: 600, pitch: -30.0, heading: 270.0, name: "Σκήτη Προβάτα", folder: "provata", caption: "Λεζάντα για τη Σκήτη Προβάτα." },
      "agiou_dimitriou": { lon: 24.2364, lat: 40.3014, height: 550, pitch: -30.0, heading: 180.0, name: "Σκήτη Αγίου Δημητρίου", folder: "agiosdimitrios", caption: "Λεζάντα για τη Σκήτη Αγίου Δημητρίου." },
      "agiou_andrea": { lon: 24.2525, lat: 40.2602, height: 500, pitch: -30.0, heading: 210.0, name: "Σκήτη Αγίου Ανδρέα (Σεράι)", folder: "agiosandreas", caption: "Λεζάντα για τη Σκήτη Αγίου Ανδρέα." },
      "timiou_prodromou": { lon: 24.3164, lat: 40.2486, height: 500, pitch: -25.0, heading: 270.0, name: "Σκήτη Τιμίου Προδρόμου", folder: "timiosprodromos", caption: "Λεζάντα για τη Σκήτη Τιμίου Προδρόμου." },
      "profiti_ilia": { lon: 24.2497, lat: 40.2741, height: 550, pitch: -25.0, heading: 160.0, name: "Σκήτη Προφήτου Ηλιού", folder: "profitisilias", caption: "Λεζάντα για τη Σκήτη Προφήτου Ηλιού." },
      "agias_triados": { lon: 24.1238, lat: 40.3214, height: 550, pitch: -30.0, heading: 45.0, name: "Σκήτη Αγίας Τριάδος", folder: "agiatriada", caption: "Λεζάντα για τη Σκήτη Αγίας Τριάδος." },
      "nea_skiti": { lon: 24.2694, lat: 40.1472, height: 600, pitch: -25.0, heading: 45.0, name: "Νέα Σκήτη", folder: "neaskiti", caption: "Λεζάντα για τη Νέα Σκήτη." },
      "evaggelismou_xenof": { lon: 24.1947, lat: 40.2528, height: 550, pitch: -30.0, heading: 90.0, name: "Σκήτη Ευαγγελισμού (Ξενοφώντος)", folder: "evaggelismos", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." },
      "agiou_panteleimonos_kout": { lon: 24.2547, lat: 40.2444, height: 500, pitch: -30.0, heading: 0.0, name: "Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)", folder: "panteleimon_kout", caption: "Λεζάντα για τη Σκήτη Αγίου Παντελεήμονος." },
      "evaggelismou_filoth": { lon: 24.3114, lat: 40.2164, height: 550, pitch: -30.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evaggelismos_fil", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." }
    };

    // Αυτόματη δημιουργία Πινεζών (Markers)
    for (const key in locations) {
      if (key === "general") continue;
      
      const loc = locations[key];
      const isSkiti = loc.name.includes("Σκήτη") || loc.name.includes("Μικρά") || loc.name.includes("Καυσοκαλύβια");
      const markerColor = isSkiti ? Cesium.Color.DODGERBLUE : Cesium.Color.RED;

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND 
        },
        name: loc.name
      });

      entity.locationKey = key;
    }

    // ΣΥΝΑΡΤΗΣΗ ΕΜΦΑΝΙΣΗΣ ΦΩΤΟΓΡΑΦΙΑΣ
    function showLocationInfo(key) {
      const data = locations[key];

      if (!data || key === "general") {
        document.getElementById('customInfoBox').classList.remove('active');
        return;
      }

      // Γεμίζουμε τα στοιχεία του πλαϊνού παραθύρου
      document.getElementById('infoTitle').innerText = data.name;
      document.getElementById('infoImage').src = `fotografies/${data.folder}/${data.folder}_1.jpg`;
      document.getElementById('infoImage').alt = data.name;
      document.getElementById('infoCaption').innerText = data.caption;

      // Εμφάνιση παραθύρου
      document.getElementById('customInfoBox').classList.add('active');
    }

    // 1. LEFT CLICK πάνω σε ΠΙΝΕΖΑ
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          const target = locations[entity.locationKey];
          viewer.camera.flyTo({
            destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
            orientation: { heading: Cesium.Math.toRadians(target.heading), pitch: Cesium.Math.toRadians(target.pitch), roll: 0.0 },
            duration: 2.5
          });
          document.getElementById('locationSelect').value = entity.locationKey;
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // 2. ΑΛΛΑΓΗ ΑΠΟ ΤΟ DROPDOWN ΜΕΝΟΥ
    document.getElementById('locationSelect').addEventListener('change', function() {
      const value = this.value;
      const target = locations[value];
      if (target) {
        showLocationInfo(value);
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
          orientation: { heading: Cesium.Math.toRadians(target.heading), pitch: Cesium.Math.toRadians(target.pitch), roll: 0.0 },
          duration: 3.5
        });
      }
    });

    // 3. ΚΟΥΜΠΙ ΚΛΕΙΣΙΜΑΤΟΣ (X) ΣΤΟ SIDEBAR (Ο ήχος ΔΕΝ σταματάει πλέον)
    document.getElementById('closeBtn').addEventListener('click', function() {
      document.getElementById('customInfoBox').classList.remove('active');
      document.getElementById('locationSelect').value = "";
    });

  </script>
</body>
</html>
