<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Οδοιπορικό στο Άγιο Όρος</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link rel="stylesheet" href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* Cesium πλήρης κάλυψη */
    #cesiumContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Splash screen */
    #splashScreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      background: #0c1219 url('intro.jpg') no-repeat center center;
      background-size: contain;
      z-index: 99999;
      opacity: 1;
      transition: opacity 1.5s ease;
    }

    #splashScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Κεντρικός τίτλος & Στυλ για τα HTML ονόματα των Μονών */
    #mainAppTitle, .cesium-html-label {
      position: absolute;
      padding: 10px 20px;
      border: 1px solid #dfb76c;
      background: rgba(20, 20, 20, 0.85);
      color: #dfb76c;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.7);
      font-weight: bold;
      white-space: nowrap;
      pointer-events: none;
    }

    #mainAppTitle {
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100000;
      font-size: 22px;
    }

    /* Δυναμικό HTML Πλαίσιο Ονομάτων Μονών/Σκητών πάνω στον χάρτη */
    .cesium-html-label {
      z-index: 99;
      font-size: 14px;
      transform: translate(-50%, -140%); /* Κεντράρισμα ακριβώς πάνω από την πινέζα */
      display: none; /* Ελέγχεται δυναμικά από το JS */
      transition: opacity 0.2s ease;
    }

    /* Μενού πλοήγησης slide-out */
    #menuContainer {
      position: fixed;
      top: 80px;
      left: -350px;
      width: 320px;
      max-height: 70vh;
      background: rgba(10, 10, 10, 0.9);
      border-radius: 8px;
      border: 1px solid #dfb76c;
      box-shadow: 0 0 16px rgba(0,0,0,0.8);
      color: #dfb76c;
      padding: 12px;
      z-index: 99998;
      transition: left 0.4s ease;
      overflow-y: auto;
    }

    #menuContainer.active {
      left: 20px;
    }

    .menu-section {
      margin-bottom: 15px;
    }

    .menu-section h3 {
      margin: 0 0 8px 0;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .menu-section select {
      width: 100%;
      padding: 8px;
      background: #111;
      border: 1px solid #dfb76c;
      color: #fff;
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    /* Κουμπί επαναφοράς */
    #homeFlyBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 50px;
      height: 50px;
      background: #111 url('introsmall.jpg') no-repeat center center;
      background-size: cover;
      border: 1px solid #dfb76c;
      border-radius: 8px;
      cursor: pointer;
      z-index: 99999;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    /* Info box / bottom sheet */
    #customInfoBox {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 380px;
      max-height: 60vh;
      background: rgba(10, 10, 10, 0.95);
      border-radius: 12px;
      border: 1px solid #dfb76c;
      box-shadow: 0 0 16px rgba(0,0,0,0.8);
      color: #fff;
      padding: 15px;
      z-index: 99998;
      display: flex;
      flex-direction: column;
      transition: transform 0.4s ease, opacity 0.4s ease;
      transform: translateY(120%);
      opacity: 0;
    }

    #customInfoBox.active {
      transform: translateY(0);
      opacity: 1;
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .tabs button {
      flex: 1;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #dfb76c;
      color: #dfb76c;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .tabs button:hover {
      background: #2a2a2a;
    }

    .tabs button.active {
      background: #dfb76c;
      color: #000;
    }

    #tabContent {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }

    .tab-panel {
      display: none;
      color: #eee;
      font-size: 14px;
      line-height: 1.6;
    }

    .tab-panel.active {
      display: block;
    }

    #galleryLayer {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    #galleryLayer.active {
      display: flex;
    }

    #galleryLayer img {
      width: 100%;
      height: auto;
      border-radius: 6px;
      border: 1px solid #333;
    }

    /* Mobile responsiveness */
    @media (max-width: 768px) {
      #mainAppTitle {
        top: 15%;
        font-size: 18px;
      }

      #homeFlyBtn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
      }

      #customInfoBox {
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 65vh;
        border-radius: 12px 12px 0 0;
        box-sizing: border-box;
      }

      #menuContainer {
        top: 70px;
        left: -350px;
        width: 90%;
      }
      
      #menuContainer.active {
        left: 5%;
      }
    }
  </style>
</head>
<body>

  <div id="mainAppTitle">Οδοιπορικό στο Άγιο Όρος</div>

  <div id="splashScreen"></div>

  <button id="homeFlyBtn" title="Γενική θέα"></button>

  <div id="menuContainer">
    <div class="menu-section">
      <h3>🏰 Ιερές Μονές</h3>
      <select id="monasterySelect">
        <option value="" disabled selected>-- Επιλέξτε Μονή --</option>
      </select>
    </div>
    <div class="menu-section">
      <h3>⛪ Ιερές Σκήτες</h3>
      <select id="sketesSelect">
        <option value="" disabled selected>-- Επιλέξτε Σκήτη --</option>
      </select>
    </div>
    <div class="menu-section">
      <h3>🥾 Διαδρομές Αποστολών</h3>
      <select id="routesSelect">
        <option value="" disabled selected>-- Επιλέξτε Διαδρομή --</option>
        <option value="route1">Προσεχώς: Διαδρομή 1</option>
        <option value="route2">Προσεχώς: Διαδρομή 2</option>
      </select>
    </div>
  </div>

  <div id="customInfoBox">
    <div class="tabs">
      <button data-tab="photos" class="active">🖼️ Φωτογραφίες</button>
      <button data-tab="history">📜 Ιστορία</button>
      <button data-tab="tradition">⛪ Παράδοση</button>
    </div>
    <div id="tabContent">
      <div id="galleryLayer" class="tab-panel active"></div>
      <div id="historyLayer" class="tab-panel"></div>
      <div id="traditionLayer" class="tab-panel"></div>
    </div>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // 1. ΑΡΧΙΚΟΠΟΙΗΣΗ CESIUM
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrainProvider: Cesium.Terrain.fromWorldTerrain(),
      animation: false,
      timeline: false,
      sceneModePicker: false,
      infoBox: false,
      selectionIndicator: false,
      geocoder: false,
      navigationHelpButton: false,
      baseLayerPicker: false,
      homeButton: false,
      fullscreenButton: false
    });

    const initialCamera = {
      destination: Cesium.Cartesian3.fromDegrees(24.328640, 40.046140, 25000.0),
      orientation: {
        heading: Cesium.Math.toRadians(345.0),
        pitch: Cesium.Math.toRadians(-30.0),
        roll: 0.0
      }
    };

    viewer.scene.camera.setView(initialCamera);

    function flyToGeneral(height = 25000.0) {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(24.328640, 40.046140, height),
        orientation: initialCamera.orientation,
        duration: 3.5
      });
    }

    // 2. ΔΕΔΟΜΕΝΑ ΤΟΠΟΘΕΣΙΩΝ
    const locations = {
      "megistis_lavras": { lon: 24.382442, lat: 40.170425, height: 900, pitch: -60.0, heading: 340.0, name: "Ι.Μ. Μεγίστης Λαύρας", folder: "lavra", category: "monastery" },
      "vatopediou": { lon: 24.212023, lat: 40.314502, height: 900, pitch: -60.0, heading: 180.0, name: "Ι.Μ. Βατοπαιδίου", folder: "vatopedi", category: "monastery" },
      "iviron": { lon: 24.285096, lat: 40.245582, height: 900, pitch: -60.0, heading: 290.0, name: "Ι.Μ. Ιβήρων", folder: "iviron", category: "monastery" },
      "chilandariou": { lon: 24.119725, lat: 40.334444, height: 900, pitch: -60.0, heading: 45.0, name: "Ι.Μ. Χιλανδαρίου", folder: "hiliantari", category: "monastery" },
      "dionysiou": { lon: 24.274533, lat: 40.168393, height: 900, pitch: -60.0, heading: 45.0, name: "Ι.Μ. Διονυσίου", folder: "dion", category: "monastery" },
      "koutloumousiou": { lon: 24.247580, lat: 40.253324, height: 900, pitch: -60.0, heading: 0.0, name: "Ι.Μ. Κουτλουμουσίου", folder: "koutlou", category: "monastery" },
      "pantokratoros": { lon: 24.266387, lat: 40.283611, height: 900, pitch: -60.0, heading: 250.0, name: "Ι.Μ. Παντοκράτορος", folder: "padokratoros", category: "monastery" },
      "xiropotamou": { lon: 24.221407, lat: 40.228528, height: 900, pitch: -60.0, heading: 60.0, name: "Ι.Μ. Ξηροποτάμου", folder: "xiropotamou", category: "monastery" },
      "zografou": { lon: 24.160179, lat: 40.306106, height: 900, pitch: -60.0, heading: 130.0, name: "Ι.Μ. Ζωγράφου", folder: "zografou", category: "monastery" },
      "docheiariou": { lon: 24.172520, lat: 40.266710, height: 900, pitch: -60.0, heading: 90.0, name: "Ι.Μ. Δοχειαρίου", folder: "doh", category: "monastery" },
      "karakallou": { lon: 24.308786, lat: 40.223605, height: 900, pitch: -60.0, heading: 300.0, name: "Ι.Μ. Καρακάλλου", folder: "karakallou", category: "monastery" },
      "filotheou": { lon: 24.291150, lat: 40.225778, height: 900, pitch: -60.0, heading: 320.0, name: "Ι.Μ. Φιλοθέου", folder: "filoth", category: "monastery" },
      "simonopetra": { lon: 24.247329, lat: 40.190529, height: 900, pitch: -60.0, heading: 45.0, name: "Ι.Μ. Σίμωνος Πέτρας", folder: "petra", category: "monastery" },
      "agiou_pavlou": { lon: 24.290312, lat: 40.160358, height: 900, pitch: -60.0, heading: 20.0, name: "Ι.Μ. Αγίου Παύλου", folder: "pavlou", category: "monastery" },
      "stavronikita": { lon: 24.276963, lat: 40.267846, height: 900, pitch: -60.0, heading: 240.0, name: "Ι.Μ. Σταυρονικήτα", folder: "stavronikita", category: "monastery" },
      "xenofontos": { lon: 24.178726, lat: 40.258651, height: 900, pitch: -60.0, heading: 90.0, name: "Ι.Μ. Ξενοφώντος", folder: "xenofodos", category: "monastery" },
      "grigoriou": { lon: 24.255946, lat: 40.179635, height: 900, pitch: -60.0, heading: 45.0, name: "Ι.Μ. Γρηγορίου", folder: "grigoriou", category: "monastery" },
      "esfigmenou": { lon: 24.138106, lat: 40.352487, height: 900, pitch: -60.0, heading: 180.0, name: "Ι.Μ. Εσφιγμένου", folder: "esfigmenou", category: "monastery" },
      "agiou_panteleimonos": { lon: 24.201154, lat: 40.237667, height: 900, pitch: -60.0, heading: 90.0, name: "Ι.Μ. Αγίου Παντελεήμονος", folder: "pantel", category: "monastery" },
      "konstamonitou": { lon: 24.174820, lat: 40.288587, height: 900, pitch: -60.0, heading: 120.0, name: "Ι.Μ. Κωνσταμονίτου", folder: "konstamonitou", category: "monastery" },
      
      "agias_annis": { lon: 24.296918, lat: 40.140421, height: 900, pitch: -60.0, heading: 45.0, name: "Σκήτη Αγίας Άννης", folder: "anna", category: "skete" },
      "mikra_agia_anna": { lon: 24.291801, lat: 40.138597, height: 900, pitch: -60.0, heading: 30.0, name: "Μικρά Αγία Άννα", folder: "mikraanna", category: "skete" },
      "kafsokalyvia": { lon: 24.340173, lat: 40.130303, height: 900, pitch: -60.0, heading: 340.0, name: "Καυσοκαλύβια", folder: "Kafsolalivia", category: "skete" },
      "provata": { lon: 24.314574, lat: 40.217606, height: 900, pitch: -60.0, heading: 270.0, name: "Σκήτη Προβάτα", folder: "provata", category: "skete" },
      "agiou_dimitriou": { lon: 24.219473, lat: 40.302712, height: 900, pitch: -60.0, heading: 180.0, name: "Σκήτη Αγίου Δημητρίου", folder: "agioudimitriou", category: "skete" },
      "agiou_andrea": { lon: 24.244579, lat: 40.262255, height: 900, pitch: -60.0, heading: 210.0, name: "Σκήτη Αγίου Ανδρέα (Σεράι)", folder: "andrea", category: "skete" },
      "timiou_prodromou": { lon: 24.277335, lat: 40.239258, height: 900, pitch: -60.0, heading: 270.0, name: "Σκήτη Τιμίου Προδρόμου", folder: "prodrom", category: "skete" },
      "profiti_ilia": { lon: 24.252869, lat: 40.281049, height: 900, pitch: -60.0, heading: 160.0, name: "Σκήτη Προφήτου Ηλιού", folder: "profitiilia", category: "skete" },
      "agias_triados": { lon: 24.340484, lat: 40.129433, height: 900, pitch: -60.0, heading: 45.0, name: "Σκήτη Αγίας Τριάδος", folder: "triados", category: "skete" },
      "nea_skiti": { lon: 24.290025, lat: 40.145914, height: 900, pitch: -60.0, heading: 45.0, name: "Νέα Σκήτη", folder: "neaskiti", category: "skete" },
      "evaggelismou_xenof": { lon: 24.199926, lat: 40.252863, height: 900, pitch: -60.0, heading: 90.0, name: "Σκήτη Ευαγγελισμού (Ξενοφώντος)", folder: "evagelxenof", category: "skete" },
      "agiou_panteleimonos_kout": { lon: 24.258978, lat: 40.253387, height: 900, pitch: -60.0, heading: 0.0, name: "Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)", folder: "skitipantel", category: "skete" },
      "evaggelismou_filoth": { lon: 24.199945, lat: 40.252755, height: 900, pitch: -60.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evagelfiloth", category: "skete" }
    };

    // Λίστα για την παρακολούθηση των HTML Overlays
    const htmlOverlays = [];

    // 3. ΣΥΝΑΡΤΗΣΗ ΔΗΜΙΟΥΡΓΙΑΣ ΔΥΝΑΜΙΚΩΝ HTML LABELS (ΑΠΟΛΥΤΗ ΚΑΘΑΡΟΤΗΤΑ CSS)
    function createHTMLOverlayLabel(key, name, category) {
      const div = document.createElement('div');
      div.className = 'cesium-html-label';
      div.innerText = name;
      document.body.appendChild(div);

      // Καθορισμός ορίων ορατότητας (LOD) με βάση το υψόμετρο κάμερας
      let maxVisibleDistance = 32000.0; // Σκήτες
      if (category === "monastery") {
        if (key === "megistis_lavras" || key === "vatopediou" || key === "iviron") {
          maxVisibleDistance = 500000.0; // Οι 3 μεγάλες Μονές
        } else {
          maxVisibleDistance = 95000.0;  // Οι υπόλοιπες Μονές
        }
      }

      htmlOverlays.push({
        element: div,
        key: key,
        category: category,
        maxDistance: maxVisibleDistance
      });
    }

    // 4. ΠΡΟΣΘΗΚΗ ENTITY ΜΟΝΟ ΓΙΑ ΤΗΝ ΠΙΝΕΖΑ
    function addLocationEntity(key, options) {
      const { name, lon, lat, category } = options;

      const colorMap = {
        monastery: '#dfb76c', 
        skete: '#800020',     
        route: '#1a73e8',     
        other: '#cd7f32'      
      };

      const hexColor = colorMap[category] || colorMap.other;

      const entity = viewer.entities.add({
        name,
        position: Cesium.Cartesian3.fromDegrees(lon, lat, 0),
        point: {
          pixelSize: 12,
          color: Cesium.Color.fromCssColorString(hexColor),
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, 500000.0)
        }
      });

      entity.locationKey = key;
      
      // Δημιουργία του αντίστοιχου HTML Overlay
      createHTMLOverlayLabel(key, name, category);
      
      return entity;
    }

    // 5. ΑΥΤΟΜΑΤΟ LOOP ΓΙΑ ΓΕΜΙΣΜΑ SELECTS ΚΑΙ ΧΑΡΤΗ
    const monasterySelect = document.getElementById('monasterySelect');
    const sketesSelect = document.getElementById('sketesSelect');

    for (const key in locations) {
      const loc = locations[key];
      addLocationEntity(key, loc); 

      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = loc.name;
      
      if (loc.category === 'monastery') {
        monasterySelect.appendChild(opt);
      } else if (loc.category === 'skete') {
        sketesSelect.appendChild(opt);
      }
    }

    // ΜΗΧΑΝΙΣΜΟΣ ΣΥΓΧΡΟΝΙΣΜΟΥ HTML LABELS ΜΕ ΤΗΝ ΚΙΝΗΣΗ ΤΗΣ 3D ΚΑΜΕΡΑΣ
    viewer.scene.postRender.addEventListener(function () {
      const cameraPosition = viewer.camera.position;
      const cartographic = Cesium.Cartographic.fromCartesian(cameraPosition);
      const cameraHeight = cartographic.height; // Κατακόρυφο υψόμετρο κάμερας

      htmlOverlays.forEach(overlay => {
        const locData = locations[overlay.key];
        const position3D = Cesium.Cartesian3.fromDegrees(locData.lon, locData.lat, 0);
        
        // Υπολογισμός πραγματικής απόστασης (Slant Range) από την κάμερα
        const distance = Cesium.Cartesian3.distance(cameraPosition, position3D);

        // Έλεγχος LOD φίλτρου
        if (distance > overlay.maxDistance) {
          overlay.element.style.display = 'none';
          return;
        }

        // Μετατροπή 3D συντεταγμένων σε 2D Pixel θέσεις στην οθόνη
        const canvasPosition = viewer.scene.cartesianToCanvasCoordinates(position3D);
        
        if (Cesium.defined(canvasPosition)) {
          overlay.element.style.display = 'block';
          overlay.element.style.left = Math.floor(canvasPosition.x) + 'px';
          overlay.element.style.top = Math.floor(canvasPosition.y) + 'px';
        } else {
          overlay.element.style.display = 'none';
        }
      });
    });

    // 6. CLICK HANDLER & FLYTOBOUNDINGSPHERE
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    let windowCurrentFolder = 'default';

    handler.setInputAction(function (movement) {
      const picked = viewer.scene.pick(movement.position);
      if (Cesium.defined(picked) && picked.id) {
        const entity = picked.id;
        if (entity.locationKey) {
          const locData = locations[entity.locationKey];
          const bs = new Cesium.BoundingSphere(entity.position.getValue(Cesium.JulianDate.now()), 0.0);

          viewer.camera.flyToBoundingSphere(bs, {
            duration: 2.5,
            offset: new Cesium.HeadingPitchRange(
              Cesium.Math.toRadians(locData.heading || 345.0),
              Cesium.Math.toRadians(locData.pitch || -30.0),
              locData.height || 8000.0
            )
          });

          windowCurrentFolder = locData.folder;
          updateInfoBox(locData.name, windowCurrentFolder);
          clearSelects();
          
          if (locData.category === 'monastery') {
            monasterySelect.value = entity.locationKey;
          } else if (locData.category === 'skete') {
            sketesSelect.value = entity.locationKey;
          }
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // 7. ΔΙΑΧΕΙΡΙΣΗ SELECTS ΠΛΟΗΓΗΣΗΣ
    function handleSelectChange(selectEl) {
      if (selectEl.value) {
        const key = selectEl.value;
        const locData = locations[key];
        const targetCenter = Cesium.Cartesian3.fromDegrees(locData.lon, locData.lat);
        const bs = new Cesium.BoundingSphere(targetCenter, 0.0);

        viewer.camera.flyToBoundingSphere(bs, {
          duration: 2.5,
          offset: new Cesium.HeadingPitchRange(
            Cesium.Math.toRadians(locData.heading),
            Cesium.Math.toRadians(locData.pitch),
            locData.height
          )
        });

        windowCurrentFolder = locData.folder;
        updateInfoBox(locData.name, windowCurrentFolder);
        
        if (selectEl.id === 'monasterySelect') document.getElementById('sketesSelect').value = '';
        if (selectEl.id === 'sketesSelect') document.getElementById('monasterySelect').value = '';
      }
    }

    monasterySelect.addEventListener('change', () => handleSelectChange(monasterySelect));
    sketesSelect.addEventListener('change', () => handleSelectChange(sketesSelect));

    function clearSelects() {
      monasterySelect.value = '';
      sketesSelect.value = '';
      document.getElementById('routesSelect').value = '';
    }

    // 8. ΣΕΙΡΙΑΚΗ ΦΟΡΤΩΣΗ ΦΩΤΟΓΡΑΦΙΩΝ & TABS
    function loadPhotos(currentFolder) {
      const gallery = document.getElementById('galleryLayer');
      gallery.innerHTML = '';

      for (let i = 1; i <= 30; i++) {
        const tempImg = new Image();
        tempImg.src = `fotografies/${currentFolder}/${currentFolder}_${i}.jpg`;
        tempImg.onload = () => {
          const imgEl = document.createElement('img');
          imgEl.src = tempImg.src;
          gallery.appendChild(imgEl);
        };
      }
    }

    function updateInfoBox(titleText, currentFolder) {
      document.getElementById('customInfoBox').classList.add('active');
      switchTab('photos', currentFolder);
    }

    function switchTab(tabName, currentFolder) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));

      document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');

      const galleryLayer = document.getElementById('galleryLayer');
      const historyLayer = document.getElementById('historyLayer');
      const traditionLayer = document.getElementById('traditionLayer');

      if (tabName === 'photos') {
        galleryLayer.classList.add('active');
        loadPhotos(currentFolder);
      } else if (tabName === 'history') {
        historyLayer.classList.add('active');
        historyLayer.innerHTML = "Φόρτωση κειμένου...";
        fetch(`keimena/${currentFolder}/istoria.txt`)
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(txt => { historyLayer.innerHTML = txt.replace(/\n/g, '<br>'); })
          .catch(() => { historyLayer.innerHTML = "Το ιστορικό σημείωμα δεν είναι διαθέσιμο."; });
      } else if (tabName === 'tradition') {
        traditionLayer.classList.add('active');
        traditionLayer.innerHTML = "Φόρτωση κειμένου...";
        fetch(`keimena/${currentFolder}/paradosi.txt`)
          .then(r => { if (!r.ok) throw new Error(); return r.text(); })
          .then(txt => { traditionLayer.innerHTML = txt.replace(/\n/g, '<br>'); })
          .catch(() => { traditionLayer.innerHTML = "Τα στοιχεία ιεράς παράδοσης δεν είναι διαθέσιμα."; });
      }
    }

    document.querySelectorAll('#customInfoBox .tabs button').forEach(btn => {
      btn.addEventListener('click', () => {
        switchTab(btn.dataset.tab, windowCurrentFolder);
      });
    });

    // 9. UI CONTROL INTERACTION
    document.getElementById('homeFlyBtn').addEventListener('click', () => {
      flyToGeneral(25000.0);
    });

    function toggleMenu() {
      const menu = document.getElementById('menuContainer');
      menu.classList.toggle('active');
    }

    document.getElementById('mainAppTitle').style.pointerEvents = 'auto';
    document.getElementById('mainAppTitle').addEventListener('click', toggleMenu);

    window.addEventListener('load', () => {
      const splash = document.getElementById('splashScreen');
      setTimeout(() => {
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 1500);
      }, 3000);
    });
  </script>
</body>
</html>
