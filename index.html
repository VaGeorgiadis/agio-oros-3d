<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Accordion Style) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 320px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
    }

    .menu-header {
      color: #dfb76c;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
    }

    /* Στυλ για τα Κουμπιά του Accordion */
    .accordion-btn {
      width: 100%;
      background: #222;
      color: #dfb76c;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 5px;
      outline: none;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
    }

    .accordion-btn:hover {
      background: #2a2a2a;
    }

    /* Το εσωτερικό περιεχόμενο που ανοιγοκλείνει */
    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      margin-bottom: 5px;
    }

    .accordion-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    /* AUDIO PLAYER */
    .audio-player-container {
      background: #1a1a1a;
      padding: 8px;
      border-radius: 6px;
      margin-top: 10px;
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ (Sidebar για υπολογιστές) */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease, bottom 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    #infoImage {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      border-radius: 6px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    #infoCaption {
      font-size: 15px;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
      margin-top: 15px;
      background: #222;
      padding: 12px;
      border-left: 4px solid #dfb76c;
      border-radius: 0 6px 6px 0;
    }

    /* ΡΥΘΜΙΣΕΙΣ ΓΙΑ ΚΙΝΗΤΑ */
    @media screen and (max-width: 768px) {
      #menuContainer {
        top: 10px;
        left: 5%;
        width: 90%;
        padding: 10px;
      }
      .accordion-btn { padding: 8px; font-size: 12px; }
      #customInfoBox {
        top: auto;
        right: 0 !important;
        bottom: -100%;
        left: 0;
        width: 100%;
        max-height: 50vh;
        border-radius: 12px 12px 0 0;
        padding: 15px;
      }
      #customInfoBox.active { bottom: 0; }
      #infoImage { max-height: 180px; }
    }
  </style>
</head>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    // 1. ΔΙΟΡΘΩΣΗ: Απόλυτο κεντράρισμα και αυξημένο υψόμετρο για όλη τη χερσόνησο
    function flyToGeneral() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(24.250000, 40.245000, 35000), // Υψόμετρο 35χλμ, κέντρο χερσονήσου

      "zografou": { lon: 24.160158, lat: 40.305918, height: 900, pitch: -35.0, heading: 130.0, name: "Ι.Μ. Ζωγράφου", folder: "zografou", caption: "Λεζάντα για τη Μονή Ζωγράφου." },
      "docheiariou": { lon: 24.172795, lat: 40.266663, height: 850, pitch: -35.0, heading: 90.0, name: "Ι.Μ. Δοχειαρίου", folder: "docheiariou", caption: "Λεζάντα για τη Μονή Δοχειαρίου." },

      "simonopetra": { lon: 24.246928, lat: 40.190439, height: 950, pitch: -35.0, heading: 45.0, name: "Ι.Μ. Σίμωνος Πέτρας", folder: "simonopetra", caption: "Λεζάντα για τη Μονή Σίμωνος Πέτρας." },
      "agiou_pavlou": { lon: 24.290316, lat: 40.161028, height: 950, pitch: -35.0, heading: 20.0, name: "Ι.Μ. Αγίου Παύλου", folder: "agioupavlou", caption: "Λεζάντα για τη Μονή Αγίου Παύλου." },
      "stavronikita": { lon: 24.277503, lat: 40.268082, height: 850, pitch: -35.0, heading: 240.0, name: "Ι.Μ. Σταυρονικήτα", folder: "stavronikita", caption: "Λεζάντα για τη Μονή Σταυρονικήτα." },

      "grigoriou": { lon: 24.256003, lat: 40.179493, height: 900, pitch: -35.0, heading: 45.0, name: "Ι.Μ. Γρηγορίου", folder: "grigoriou", caption: "Λεζάντα για τη Μονή Γρηγορίου." },

      "agiou_panteleimonos": { lon: 24.201429, lat: 40.237967, height: 900, pitch: -35.0, heading: 90.0, name: "Ι.Μ. Αγίου Παντελεήμονος", folder: "panteleimon", caption: "Λεζάντα για τη Μονή Αγίου Παντελεήμονος." },
      "konstamonitou": { lon: 24.174802, lat: 40.288677, height: 900, pitch: -35.0, heading: 120.0, name: "Ι.Μ. Κωνσταμονίτου", folder: "konstamonitou", caption: "Λεζάντα για τη Μονή Κωνσταμονίτου." },
      
      // ΣΚΗΤΕΣ
      "agias_annis": { lon: 24.296918, lat: 40.140421, height: 900, pitch: -35.0, heading: 45.0, name: "Σκήτη Αγίας Άννης", folder: "agiaanna", caption: "Λεζάντα για τη Σκήτη Αγίας Άννης." },

      "agiou_dimitriou": { lon: 24.219473, lat: 40.302712, height: 850, pitch: -35.0, heading: 180.0, name: "Σκήτη Αγίου Δημητρίου", folder: "agiosdimitrios", caption: "Λεζάντα για τη Σκήτη Αγίου Δημητρίου." },

      "agias_triados": { lon: 24.340484, lat: 40.129433, height: 850, pitch: -35.0, heading: 45.0, name: "Σκήτη Αγίας Τριάδος", folder: "agiatriada", caption: "Λεζάντα για τη Σκήτη Αγίας Τριάδος." },
      "nea_skiti": { lon: 24.290025, lat: 40.145914, height: 900, pitch: -35.0, heading: 45.0, name: "Νέα Σκήτη", folder: "neaskiti", caption: "Λεζάντα για τη Νέα Σκήτη." },
      "evaggelismou_xenof": { lon: 24.199926, lat: 40.252863, height: 850, pitch: -35.0, heading: 90.0, name: "Σκήτη Ευαγγελισμού (Ξενοφώντος)", folder: "evaggelismos", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." },

      "evaggelismou_filoth": { lon: 24.199945, lat: 40.252755, height: 850, pitch: -35.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evaggelismos_fil", caption: "Λεζάντα για τη Σκήτη Ευαγγελισμού." }
    };

    // Δημιουργία Πινεζών κανονικά
    for (const key in locations) {
      if (key === "general") continue;
      const loc = locations[key];
      const isSkiti = loc.name.includes("Σκήτη") || loc.name.includes("Μικρά") || loc.name.includes("Καυσοκαλύβια");
      const markerColor = isSkiti ? Cesium.Color.DODGERBLUE : Cesium.Color.RED;

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND 
        },
        name: loc.name
      });
      entity.locationKey = key;
    }

    // 2. ΔΙΟΡΘΩΣΗ: Σωστή πτήση κάμερας με αντισταθμισμένο offset για τέλειο κεντράρισμα
    function flyToLocation(target) {
      // Υπολογισμός offset για να μην πηγαίνει η κάμερα πιο βόρεια λόγω της κλίσης (pitch)
      const pitchRad = Cesium.Math.toRadians(target.pitch);
      const offsetFactor = Math.cos(Math.abs(pitchRad)) * (target.height / 111000); 
      const adjustedLat = target.lat - (offsetFactor * 0.4); // Διορθώνει τη μετατόπιση προς τα πάνω

      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(target.lon, adjustedLat, target.height),
        orientation: {
          heading: Cesium.Math.toRadians(target.heading),
          pitch: pitchRad,
          roll: 0.0
        },
        duration: 3.0
      });
    }

    function showLocationInfo(key) {
      const data = locations[key];
      if (!data) return;

      document.getElementById('infoTitle').innerText = data.name;
      document.getElementById('infoImage').src = `fotografies/${data.folder}/${data.folder}_1.jpg`;
      document.getElementById('infoImage').alt = data.name;
      document.getElementById('infoCaption').innerText = data.caption;
      document.getElementById('customInfoBox').classList.add('active');
    }

    // 3. ΔΙΟΡΘΩΣΗ: Λειτουργία για το Accordion Μενού
    function toggleAccordion(id) {
      const contents = document.getElementsByClassName('accordion-content');
      for (let i = 0; i < contents.length; i++) {
        if (contents[i].id !== id) {
          contents[i].style.maxHeight = null; // Κλείσιμο των άλλων
        }
      }
      const current = document.getElementById(id);
      if (current.style.maxHeight) {
        current.style.maxHeight = null;
      } else {
        current.style.maxHeight = current.scrollHeight + "px"; // Άνοιγμα
      }
    }

    function clearSelects() {
      document.getElementById('monasterySelect').selectedIndex = -1;
      document.getElementById('skiteSelect').selectedIndex = -1;
      document.getElementById('routeSelect').selectedIndex = -1;
    }

    // Event Listeners για τις λίστες
    document.getElementById('monasterySelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('skiteSelect').selectedIndex = -1;
      }
    });

    document.getElementById('skiteSelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('monasterySelect').selectedIndex = -1;
      }
    });

    // LEFT CLICK πάνω σε ΠΙΝΕΖΑ
    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          flyToLocation(locations[entity.locationKey]);
          
          clearSelects();
          // Επιλογή της σωστής τιμής στο ανάλογο μενού
          if (document.querySelector(`#monasterySelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('monasterySelect').value = entity.locationKey;
          } else if (document.querySelector(`#skiteSelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('skiteSelect').value = entity.locationKey;
          }
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    // ΚΟΥΜΠΙ ΚΛΕΙΣΙΜΑΤΟΣ (X)
    document.getElementById('closeBtn').addEventListener('click', function() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
    });
  </script>
</body>
</html>
