<html lang="el">
<head>

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΚΕΝΤΡΙΚΟΣ ΤΙΤΛΟΣ ΑΡΧΙΚΗΣ ΟΘΟΝΗΣ (Desktop) */
    #mainAppTitle {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(20, 20, 20, 0.85);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 12px 30px;
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1.5px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      text-align: center;
      pointer-events: none;
    }

    /* ΚΟΥΜΠΙ ΓΙΑ ΑΝΟΙΓΜΑ ΤΟΥ ΜΕΝΟΥ (Desktop) */
    #menuToggleBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(30, 30, 30, 0.95);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      transition: background 0.3s;
    }

    #menuToggleBtn:hover {
      background: #2a2a2a;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Αναδυόμενο / Slide-out) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: -350px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 320px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
      transition: left 0.4s ease;
    }

    #menuContainer.active {
      left: 20px;
    }

    .menu-header {
      color: #dfb76c;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
      padding-right: 25px;
    }

    #closeMenuBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
    }

    #closeMenuBtn:hover {
      color: #dfb76c;
    }

    .accordion-btn {
      width: 100%;
      background: #222;
      color: #dfb76c;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 5px;
      outline: none;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
    }

    .accordion-btn:hover {
      background: #2a2a2a;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      margin-bottom: 5px;
    }

    .accordion-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    .audio-player-container {
      background: #1a1a1a;
      padding: 8px;
      border-radius: 6px;
      margin-top: 10px;
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ / GALLERY */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease, bottom 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .image-container {
      position: relative;
      width: 100%;
      max-height: 350px;
      background: #111;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
    }

    #infoImage {
      width: 100%;
      max-height: 350px;
      object-fit: contain;
      display: block;
    }

    .gallery-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      font-size: 18px;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.2s;
      user-select: none;
    }

    .gallery-nav:hover {
      background: rgba(223, 183, 108, 0.8);
      color: #000;
    }

    #prevImgBtn { left: 10px; }
    #nextImgBtn { right: 10px; }

    #infoCaption {
      font-size: 15px;
      font-style: italic;
      color: #ddd;
      line-height: 1.6;
      margin-top: 15px;
      background: #222;
      padding: 12px;
      border-left: 4px solid #dfb76c;
      border-radius: 0 6px 6px 0;
    }

    /* ΡΥΘΜΙΣΕΙΣ ΓΙΑ ΚΙΝΗΤΑ (Responsive) */
    @media screen and (max-width: 768px) {
      #mainAppTitle {
        position: relative;
        top: 0;
        left: 0;
        transform: none;
        font-size: 18px;
        padding: 8px 10px;
        margin: 10px auto 5px auto;
        width: 90%;
        box-sizing: border-box;
        border-bottom: none;
        border-radius: 6px 6px 0 0;
        background: rgba(20, 20, 20, 0.95);
      }

      #menuToggleBtn {
        position: relative;
        top: 0;
        left: 0;
        display: block;
        width: 90%;
        margin: 0 auto 10px auto;
        padding: 10px;
        font-size: 13px;
        text-align: center;
        border-radius: 0 0 6px 6px;
        border-top: none;
        background: rgba(30, 30, 30, 0.95);
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
      }

      #menuContainer {
        top: 105px;
        left: -100%;
        width: 90%;
        padding: 12px;
        max-height: 75vh;
      }
      
      #menuContainer.active { left: 5%; }

      .accordion-btn { padding: 10px; font-size: 13px; }

      #customInfoBox {
        top: auto;
        right: 0 !important;
        bottom: -100%;
        left: 0;
        width: 100%;
        max-height: 50vh;
        border-radius: 12px 12px 0 0;
        padding: 15px;
      }
      
      #customInfoBox.active { bottom: 0; }
      .image-container, #infoImage { max-height: 160px; }
      .gallery-nav { padding: 4px 8px; font-size: 14px; }
    }
  </style>
</head>

      viewer.camera.flyTo({

        orientation: { heading: Cesium.Math.toRadians(338.0), pitch: Cesium.Math.toRadians(-22.0), roll: 0.0 },
        duration: 3.0

    const locations = {

      "vatopediou": { lon: 24.211683, lat: 40.314461, height: 700, pitch: -45.0, heading: 180.0, name: "Ι.Μ. Βατοπαιδίου", folder: "vatopedi" },

      "chilandariou": { lon: 24.119725, lat: 40.334444, height: 750, pitch: -45.0, heading: 45.0, name: "Ι.Μ. Χιλανδαρίου", folder: "hiliantari" },
      "dionysiou": { lon: 24.120892, lat: 40.162450, height: 650, pitch: -45.0, heading: 45.0, name: "Ι.Μ. Διονυσίου", folder: "dion" },
      "koutloumousiou": { lon: 24.247848, lat: 40.253131, height: 600, pitch: -45.0, heading: 0.0, name: "Ι.Μ. Κουτλουμουσίου", folder: "koutlou" },

      const markerColor = isSkiti ? Cesium.Color.DODGERBLUE : Cesium.Color.RED;

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND 
        },
        label: {
          text: loc.name,
          font: '13px "Segoe UI", Arial, sans-serif',
          fontWeight: 'bold',
          style: Cesium.LabelStyle.FILL_AND_OUTLINE,
          fillColor: Cesium.Color.WHITE,
          outlineColor: Cesium.Color.BLACK,
          outlineWidth: 3,
          showBackground: true,
          backgroundColor: new Cesium.Color(0.08, 0.08, 0.08, 0.75),
          backgroundPadding: new Cesium.Cartesian2(6, 4),
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -10),
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, 60000.0) 
        },
        name: loc.name
      });
      entity.locationKey = key;
    }

    // Η ΔΙΟΡΘΩΜΕΝΗ ΣΥΝΑΡΤΗΣΗ ΠΛΟΗΓΗΣΗΣ (ΚΛΕΙΔΩΝΕΙ ΑΚΡΙΒΩΣ ΣΤΟ ΣΗΜΕΙΟ ΧΩΡΙΣ OFFSET)
    function flyToLocation(target) {
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
        orientation: {
          heading: Cesium.Math.toRadians(target.heading),
          pitch: Cesium.Math.toRadians(target.pitch),
          roll: 0.0
        },
        duration: 3.0
      });
    }

    let currentFolder = "";
    let currentImgIndex = 1;

    function showLocationInfo(key) {
      const data = locations[key];
      if (!data) return;

      currentFolder = data.folder;
      currentImgIndex = 1; 

      document.getElementById('infoTitle').innerText = data.name;
      document.getElementById('infoCaption').innerText = `Φωτογραφικό υλικό από την τοποθεσία ${data.name} (Εικόνα ${currentImgIndex})`;
      
      const imgElement = document.getElementById('infoImage');
      imgElement.src = `fotografies/${currentFolder}/${currentFolder}_${currentImgIndex}.jpg`;
      imgElement.alt = data.name;

      document.getElementById('customInfoBox').classList.add('active');
    }

    function changeImage(direction) {
      if (!currentFolder) return;

      let nextIndex = currentImgIndex + direction;
      if (nextIndex < 1) return; 

      const nextSrc = `fotografies/${currentFolder}/${currentFolder}_${nextIndex}.jpg`;
      
      const testImg = new Image();
      testImg.src = nextSrc;
      
      testImg.onload = function() {
        currentImgIndex = nextIndex;
        document.getElementById('infoImage').src = nextSrc;
        document.getElementById('infoCaption').innerText = `Φωτογραφικό υλικό από την τοποθεσία ${document.getElementById('infoTitle').innerText} (Εικόνα ${currentImgIndex})`;
      };
      
      testImg.onerror = function() {
        console.log("Δεν βρέθηκαν άλλες φωτογραφίες στον φάκελο.");
      };
    }

    function toggleAccordion(id) {
      const contents = document.getElementsByClassName('accordion-content');
      for (let i = 0; i < contents.length; i++) {
        if (contents[i].id !== id) {
          contents[i].style.maxHeight = null; 
        }
      }
      const current = document.getElementById(id);
      if (current.style.maxHeight) {
        current.style.maxHeight = null;
      } else {
        current.style.maxHeight = current.scrollHeight + "px"; 
      }
    }

    function clearSelects() {
      document.getElementById('monasterySelect').selectedIndex = -1;
      document.getElementById('skiteSelect').selectedIndex = -1;
      document.getElementById('routeSelect').selectedIndex = -1;
    }

    document.getElementById('monasterySelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('skiteSelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    document.getElementById('skiteSelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('monasterySelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          flyToLocation(locations[entity.locationKey]);
          
          clearSelects();
          if (document.querySelector(`#monasterySelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('monasterySelect').value = entity.locationKey;
          } else if (document.querySelector(`#skiteSelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('skiteSelect').value = entity.locationKey;
          }
          
          const menu = document.getElementById('menuContainer');
          if (menu.classList.contains('active')) {
            toggleMenu();
          }
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    document.getElementById('closeBtn').addEventListener('click', function() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
    });
  </script>
</body>
</html>
