<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    /* ΑΡΧΙΚΗ ΟΘΟΝΗ ΥΠΟΔΟΧΗΣ (SPLASH SCREEN) */
    #splashScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0d131a url('intro.jpg') no-repeat center center;
      background-size: cover;
      z-index: 99999;
      opacity: 1;
      transition: opacity 1.5s ease-in-out;
    }

    /* ΚΕΝΤΡΙΚΟΣ ΤΙΤΛΟΣ ΑΡΧΙΚΗΣ ΟΘΟΝΗΣ (Desktop) */
    #mainAppTitle {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(20, 20, 20, 0.85);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 12px 30px;
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1.5px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      text-align: center;
      pointer-events: none;
    }

    /* ΚΟΥΜΠΙ ΓΙΑ ΑΝΟΙΓΜΑ ΤΟΥ ΜΕΝΟΥ (Desktop) */
    #menuToggleBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(30, 30, 30, 0.95);
      color: #dfb76c;
      border: 1px solid #dfb76c;
      padding: 10px 15px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      transition: background 0.3s;
    }

    #menuToggleBtn:hover {
      background: #2a2a2a;
    }

    /* ΑΥΤΟΝΟΜΟ ΚΟΥΜΠΙ ΕΠΑΝΑΦΟΡΑΣ ΜΕ ΤΟ INTROSMALL.JPG */
    #homeFlyBtn {
      position: absolute;
      top: 75px;
      left: 20px;
      z-index: 999;
      width: 50px;
      height: 50px;
      background: #111 url('introsmall.jpg') no-repeat center center;
      background-size: cover;
      border: 1px solid #dfb76c;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      transition: transform 0.2s, border-color 0.3s;
    }

    #homeFlyBtn:hover {
      transform: scale(1.05);
      border-color: #fff;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Αναδυόμενο / Slide-out) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: -350px;
      z-index: 1000;
      background: rgba(30, 30, 30, 0.95);
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0px 4px 20px rgba(0,0,0,0.6);
      border: 1px solid #dfb76c;
      width: 320px;
      box-sizing: border-box;
      max-height: 90vh;
      overflow-y: auto;
      transition: left 0.4s ease;
    }

    #menuContainer.active {
      left: 20px;
    }

    .menu-header {
      color: #dfb76c;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border-bottom: 1px solid #555;
      padding-bottom: 5px;
      padding-right: 25px;
    }

    #closeMenuBtn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 22px;
      cursor: pointer;
    }

    #closeMenuBtn:hover {
      color: #dfb76c;
    }

    .accordion-btn {
      width: 100%;
      background: #222;
      color: #dfb76c;
      text-align: left;
      padding: 10px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 5px;
      outline: none;
      transition: background 0.3s;
      display: flex;
      justify-content: space-between;
    }

    .accordion-btn:hover {
      background: #2a2a2a;
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      margin-bottom: 5px;
    }

    .accordion-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid #555;
      background: #111;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    .audio-player-container {
      background: #1a1a1a;
      padding: 8px;
      border-radius: 6px;
      margin-top: 10px;
      border-top: 1px solid #444;
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(20, 20, 20, 0.95);
      border: 1px solid #dfb76c;
      border-radius: 8px;
      box-shadow: -5px 4px 25px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 20px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s ease, bottom 0.4s ease;
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 10px;
      border-bottom: 1px solid #444;
      padding-bottom: 10px;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .display-container {
      position: relative;
      width: 100%;
      height: 360px;
      background: #111;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    #galleryLayer {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #050505;
      position: relative;
    }

    #infoImage {
      max-width: 100%;
      max-height: 280px;
      object-fit: contain;
      display: block;
      cursor: zoom-in;
    }

    .thumbnail-carousel {
      width: 100%;
      height: 70px;
      background: #151515;
      border-top: 1px solid #222;
      display: flex;
      gap: 8px;
      padding: 8px;
      box-sizing: border-box;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .thumbnail-carousel::-webkit-scrollbar {
      height: 4px;
    }
    .thumbnail-carousel::-webkit-scrollbar-thumb {
      background: #dfb76c;
      border-radius: 4px;
    }

    .thumbnail-carousel img {
      width: 54px;
      height: 54px;
      object-fit: cover;
      cursor: pointer;
      border-radius: 4px;
      border: 1px solid #444;
      transition: all 0.2s;
      opacity: 0.6;
    }

    .thumbnail-carousel img:hover, .thumbnail-carousel img.active {
      opacity: 1;
      border-color: #dfb76c;
      transform: scale(1.02);
    }

    .text-content-box {
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      font-size: 15px;
      line-height: 1.6;
      color: #eee;
      overflow-y: auto;
      background: rgba(15, 15, 15, 0.95);
      display: none;
    }

    #infoCaption {
      font-size: 13px;
      font-style: italic;
      color: #aaa;
      margin-top: 8px;
      margin-bottom: 0;
      text-align: center;
    }

    .info-tabs {
      display: flex;
      margin-top: 15px;
      gap: 5px;
    }

    .tab-btn {
      flex: 1;
      background: #1a1a1a;
      color: #aaa;
      border: 1px solid #444;
      padding: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.3s;
      border-radius: 4px;
    }

    .tab-btn:hover {
      color: #dfb76c;
      background: #252525;
    }

    .tab-btn.active {
      background: #dfb76c;
      color: #000;
      border-color: #dfb76c;
    }

    /* LIGHTBOX */
    #imageLightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      z-index: 9999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    #lightboxImg {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      border: 1px solid #444;
      border-radius: 4px;
    }

    @media screen and (max-width: 768px) {
      /* ΑΝΑΓΚΑΣΤΙΚΗ ΠΡΟΣΑΡΜΟΓΗ ΤΟΥ INTRO ΣΤΟ ΠΛΑΘΟΣ ΤΟΥ ΚΙΝΗΤΟΥ */
      #splashScreen {
        background-size: 100% auto; /* Προσαρμόζει το πλάτος στο 100% της οθόνης */
        background-color: #0c1219;  /* Συμπληρώνει με το χρώμα του φόντου πάνω/κάτω αν χρειαστεί */
      }
      #mainAppTitle {
        position: relative;
        top: 0; left: 0; transform: none;
        font-size: 18px; padding: 8px 10px; margin: 10px auto 5px auto;
        width: 90%; box-sizing: border-box; border-bottom: none; border-radius: 6px 6px 0 0;
        background: rgba(20, 20, 20, 0.95);
      }
      #menuToggleBtn {
        position: relative; top: 0; left: 0; display: block; width: 90%; margin: 0 auto 5px auto;
        padding: 10px; font-size: 13px; text-align: center; border-radius: 0; border-top: none;
        background: rgba(30, 30, 30, 0.95); box-shadow: none;
      }
      #homeFlyBtn {
        position: relative; top: 0; left: 0; display: block; width: 90%; margin: 0 auto 10px auto;
        height: 40px; border-radius: 0 0 6px 6px; border-top: none;
      }
      #menuContainer { top: 155px; left: -100%; width: 90%; padding: 12px; max-height: 65vh; }
      #menuContainer.active { left: 5%; }
      .accordion-btn { padding: 10px; font-size: 13px; }
      #customInfoBox { top: auto; right: 0 !important; bottom: -100%; left: 0; width: 100%; max-height: 65vh; border-radius: 12px 12px 0 0; padding: 15px; }
      #customInfoBox.active { bottom: 0; }
      .display-container { height: 240px; }
      #infoImage { max-height: 160px; }
      .thumbnail-carousel { height: 60px; padding: 4px; }
      .thumbnail-carousel img { width: 44px; height: 44px; }
      .text-content-box { font-size: 13px; padding: 12px; }
      .tab-btn { padding: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div id="splashScreen"></div>

  <h1 id="mainAppTitle">Οδοιπορικό στο Άγιο Όρος</h1>

  <button id="menuToggleBtn" onclick="toggleMenu()">🗺️ Μενού Πλοήγησης</button>
  <button id="homeFlyBtn" onclick="flyToGeneral()" title="Επιστροφή στην Αρχική Άποψη"></button>

  <div id="menuContainer">
    <button id="closeMenuBtn" onclick="toggleMenu()">&times;</button>
    <div class="menu-header">Πλοήγηση Αγίου Όρους</div>
    
    <button class="accordion-btn" onclick="toggleAccordion('monasteries-content')">🏰 Ιερές Μονές <span>▼</span></button>
    <div id="monasteries-content" class="accordion-content">
      <select id="monasterySelect" size="8">
        <option value="megistis_lavras">Ι.Μ. Μεγίστης Λαύρας</option>
        <option value="vatopediou">Ι.Μ. Βατοπαιδίου</option>
        <option value="iviron">Ι.Μ. Ιβήρων</option>
        <option value="chilandariou">Ι.Μ. Χιλανδαρίου</option>
        <option value="dionysiou">Ι.Μ. Διονυσίου</option>
        <option value="koutloumousiou">Ι.Μ. Κουτλουμουσίου</option>
        <option value="pantokratoros">Ι.Μ. Παντοκράτορος</option>
        <option value="xiropotamou">Ι.Μ. Ξηροποτάμου</option>
        <option value="zografou">Ι.Μ. Ζωγράφου</option>
        <option value="docheiariou">Ι.Μ. Δοχειαρίου</option>
        <option value="karakallou">Ι.Μ. Καρακάλλου</option>
        <option value="filotheou">Ι.Μ. Φιλοθέου</option>
        <option value="simonopetra">Ι.Μ. Σίμωνος Πέτρας</option>
        <option value="agiou_pavlou">Ι.Μ. Αγίου Παύλου</option>
        <option value="stavronikita">Ι.Μ. Σταυρονικήτα</option>
        <option value="xenofontos">Ι.Μ. Ξενοφώντος</option>
        <option value="grigoriou">Ι.Μ. Γρηγορίου</option>
        <option value="esfigmenou">Ι.Μ. Εσφιγμένου</option>
        <option value="agiou_panteleimonos">Ι.Μ. Αγίου Παντελεήμονος</option>
        <option value="konstamonitou">Ι.Μ. Κωνσταμονίτου</option>
      </select>
    </div>

    <button class="accordion-btn" onclick="toggleAccordion('skites-content')">⛪ Ιερές Σκήτες <span>▼</span></button>
    <div id="skites-content" class="accordion-content">
      <select id="skiteSelect" size="6">
        <option value="agias_annis">Σκήτη Αγίας Άννης</option>
        <option value="mikra_agia_anna">Μικρά Αγία Άννα</option>
        <option value="kafsokalyvia">Καυσοκαλύβια</option>
        <option value="provata">Σκήτη Προβάτα</option>
        <option value="agiou_dimitriou">Σκήτη Αγίου Δημητρίου</option>
        <option value="agiou_andrea">Σκήτη Αγίου Ανδρέα (Σεράι)</option>
        <option value="timiou_prodromou">Σκήτη Τιμίου Προδρόμου</option>
        <option value="profiti_ilia">Σκήτη Προφήτου Ηλιού</option>
        <option value="agias_triados">Σκήτη Αγίας Τριάδος</option>
        <option value="nea_skiti">Νέα Σκήτη</option>
        <option value="evaggelismou_xenof">Σκήτη Ευαγγελισμού (Ξενοφώντος)</option>
        <option value="agiou_panteleimonos_kout">Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)</option>
        <option value="evaggelismou_filoth">Σκήτη Ευαγγελισμού (Φιλοθέου)</option>
      </select>
    </div>

    <button class="accordion-btn" onclick="toggleAccordion('routes-content')">🥾 Διαδρομές Αποστολών <span>▼</span></button>
    <div id="routes-content" class="accordion-content">
      <select id="routeSelect" size="3">
        <option value="" disabled selected>-- Επιλέξτε Διαδρομή --</option>
        <option value="route1">Προσεχώς: Διαδρομή 1</option>
        <option value="route2">Προσεχώς: Διαδρομή 2</option>
      </select>
    </div>

    <div class="audio-player-container">
      <label style="color: #aaa; font-size: 11px;">Μουσική Υπόκρουση</label>
      <audio id="bgAudio" controls loop>
        <source src="ixoi/psalmwdia.mp3" type="audio/mpeg">
        Ο browser σας δεν υποστηρίζει ήχο.
      </audio>
    </div>
  </div>

  <div id="customInfoBox">
    <button id="closeBtn">&times;</button>
    <h2 id="infoTitle">Όνομα...</h2>
    
    <div class="display-container">
      <div id="galleryLayer">
        <img id="infoImage" src="" alt="" onclick="openLightbox(this)" />
      </div>
      
      <div id="thumbnailContainer" class="thumbnail-carousel"></div>
      
      <div id="textLayer" class="text-content-box">Φόρτωση κειμένου...
