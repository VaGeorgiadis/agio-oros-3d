<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }

    /* Στυλ για τη Μπάρα Αναζήτησης */
    #searchContainer {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 1000;
      background: rgba(40, 40, 40, 0.85);
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      display: flex;
      gap: 5px;
    }

    #searchInput {
      width: 250px;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #222;
      color: #fff;
      font-size: 14px;
    }

    #searchButton {
      padding: 8px 15px;
      background: #8b0000;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    #searchButton:hover {
      background: #a00000;
    }
  </style>
</head>
<body>

  <div id="searchContainer">
    <input type="text" id="searchInput" placeholder="Αναζήτηση (π.χ. Σίμωνος Πέτρα)...">
    <button id="searchButton">Μετάβαση</button>
  </div>

  <div id="cesiumContainer"></div>

  <script>
    // ΑΝΤΙΚΑΤΑΣΤΗΣΕ ΜΕ ΤΟ ΔΙΚΟ ΣΟΥ ΤΟΚΕΝ
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      animation: false,
      timeline: false,
      sceneModePicker: false,
      infoBox: true
    });

    // Αρχική θέση (Γενική θέα του Αγίου Όρους)
    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(24.2464, 40.2574, 12000),
      orientation: {
        heading: Cesium.Math.toRadians(0.0),
        pitch: Cesium.Math.toRadians(-45.0),
        roll: 0.0
      }
    });

    // Πινέζες (Markers)
    // 1. Σίμωνος Πέτρα
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(24.2461, 40.1891, 300), 
      point: { pixelSize: 12, color: Cesium.Color.RED, outlineColor: Cesium.Color.WHITE, outlineWidth: 3, heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND },
      name: 'Ιερά Μονή Σίμωνος Πέτρας',
      description: '<div style="direction: ltr;"><h3>Ιερά Μονή Σίμωνος Πέτρας</h3><p>Φωτογραφίες σύντομα...</p></div>'
    });

    // 2. Καρυές
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(24.2447, 40.2572, 370), 
      point: { pixelSize: 12, color: Cesium.Color.BLUE, outlineColor: Cesium.Color.WHITE, outlineWidth: 3, heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND },
      name: 'Καρυές (Πρωτάτο)',
      description: '<div style="direction: ltr;"><h3>Καρυές</h3><p>Η πρωτεύουσα του Αγίου Όρους.</p></div>'
    });


    // Λίστα τοποθεσιών για την αναζήτηση (με απλοποιημένα ονόματα)
    const locations = {
      "σιμωνος πετρα": { lon: 24.2461, lat: 40.1891, height: 800 },
      "σιμωνοπετρα": { lon: 24.2461, lat: 40.1891, height: 800 },
      "καρυες": { lon: 24.2447, lat: 40.2572, height: 1000 }
    };

    // Μια έξυπνη συνάρτηση που αφαιρεί τόνους και μετατρέπει σε μικρά ελληνικά γράμματα
    function cleanString(str) {
      return str
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "") // Αφαιρεί τους τόνους
        .replace(/ς\b/g, "σ"); // Μετατρέπει το τελικό ς σε σ για να μην μπερδεύεται
    }

    function performSearch() {
      let rawInput = document.getElementById('searchInput').value.trim();
      let cleanedInput = cleanString(rawInput);
      
      if (locations[cleanedInput]) {
        const target = locations[cleanedInput];
        
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(target.lon, target.lat, target.height),
          orientation: {
            heading: Cesium.Math.toRadians(0.0),
            pitch: Cesium.Math.toRadians(-30.0), 
            roll: 0.0
          },
          duration: 3.0
        });
      } else {
        alert("Το σημείο '" + rawInput + "' δεν βρέθηκε στη βάση μας ακόμα. Δοκίμασε 'Σίμωνος Πέτρα' ή 'Καρυές'.");
      }
    }

    document.getElementById('searchButton').addEventListener('click', performSearch);
    document.getElementById('searchInput').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

  </script>
</body>
</html>
