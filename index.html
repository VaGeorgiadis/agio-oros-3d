<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Άγιο Όρος 3D Χάρτης</title>
  
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* ΑΡΧΙΚΗ ΟΘΟΝΗ ΥΠΟΔΟΧΗΣ (SPLASH SCREEN) */
    #splashScreen {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 100%;
      background: #0c1219 url('intro.jpg') no-repeat center center;
      background-size: contain;
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 1;
      transition: opacity 1.5s ease;
    }

    /* ΚΕΝΤΡΙΚΟΣ ΤΙΤΛΟΣ ΑΡΧΙΚΗΣ ΟΘΟΝΗΣ (Σχήμα "Χάπι" - Premium) */
    #mainAppTitle {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(15, 15, 15, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #dfb76c;
      border: 1px solid rgba(223, 183, 108, 0.6);
      padding: 10px 30px;
      margin: 0;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1.5px;
      border-radius: 30px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      box-shadow: 0px 8px 25px rgba(0,0,0,0.6);
      text-align: center;
      pointer-events: none;
    }

    /* ΚΟΥΜΠΙ ΓΙΑ ΑΝΟΙΓΜΑ ΤΟΥ ΜΕΝΟΥ */
    #menuToggleBtn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 999;
      background: rgba(15, 15, 15, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #dfb76c;
      border: 1px solid rgba(223, 183, 108, 0.5);
      padding: 12px 20px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }

    #menuToggleBtn:hover {
      background: rgba(40, 40, 40, 0.85);
      border-color: #dfb76c;
      box-shadow: 0px 6px 25px rgba(223, 183, 108, 0.2);
    }

    /* ΑΥΤΟΝΟΜΟ ΚΟΥΜΠΙ ΕΠΑΝΑΦΟΡΑΣ ΜΕ ΤΟ INTROSMALL.JPG ΓΙΑ DESKTOP */
    #homeFlyBtn {
      position: absolute;
      top: 80px;
      left: 20px;
      z-index: 999;
      width: 50px;
      height: 50px;
      background: #111 url('introsmall.jpg') no-repeat center center;
      background-size: cover;
      border: 1px solid rgba(223, 183, 108, 0.5);
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.5);
      transition: all 0.2s ease;
    }

    #homeFlyBtn:hover {
      transform: scale(1.05);
      border-color: #fff;
    }

    /* ΚΕΝΤΡΙΚΟ ΜΕΝΟΥ (Glassmorphism Slide-out) */
    #menuContainer {
      position: absolute;
      top: 20px;
      left: -360px;
      z-index: 1000;
      background: rgba(15, 15, 15, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 10px 35px rgba(0,0,0,0.6);
      border: 1px solid rgba(223, 183, 108, 0.4);
      width: 320px;
      box-sizing: border-box;
      max-height: calc(100% - 40px);
      overflow-y: auto;
      transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #menuContainer.active {
      left: 20px;
    }

    .menu-header {
      color: #dfb76c;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
      padding-right: 25px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    #closeMenuBtn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 24px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #closeMenuBtn:hover {
      color: #dfb76c;
    }

    .accordion-btn {
      width: 100%;
      background: rgba(35, 35, 35, 0.6);
      color: #dfb76c;
      text-align: left;
      padding: 12px 15px;
      font-size: 13px;
      font-weight: bold;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 6px;
      outline: none;
      transition: all 0.2s ease;
      display: flex;
      justify-content: space-between;
    }

    .accordion-btn:hover {
      background: rgba(55, 55, 55, 0.8);
      border-color: rgba(223, 183, 108, 0.4);
    }

    .accordion-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
      margin-bottom: 8px;
    }

    .accordion-content select {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      background: rgba(10, 10, 10, 0.85);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      box-sizing: border-box;
    }

    .audio-player-container {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    
    .audio-player-container audio {
      width: 100%;
      outline: none;
      margin-top: 5px;
    }

    /* ΠΑΡΑΘΥΡΟ ΠΛΗΡΟΦΟΡΙΩΝ (Glassmorphism InfoBox) */
    #customInfoBox {
      position: absolute;
      top: 20px;
      right: -550px;
      width: 480px;
      max-height: calc(100% - 40px);
      background: rgba(15, 15, 15, 0.45);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(223, 183, 108, 0.4);
      border-radius: 12px;
      box-shadow: -5px 10px 35px rgba(0,0,0,0.7);
      z-index: 1001;
      padding: 25px;
      box-sizing: border-box;
      color: #fff;
      overflow-y: auto;
      transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1), bottom 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #customInfoBox.active {
      right: 20px;
    }

    #closeBtn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: #aaa;
      font-size: 26px;
      cursor: pointer;
      transition: color 0.2s;
    }

    #closeBtn:hover {
      color: #dfb76c;
    }

    #infoTitle {
      color: #dfb76c;
      margin-top: 5px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 12px;
      font-size: 22px;
      margin-bottom: 15px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .display-container {
      position: relative;
      width: 100%;
      height: 350px;
      background: rgba(5, 5, 5, 0.6);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .scroll-gallery {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      gap: 12px;
      padding: 12px;
      box-sizing: border-box;
    }

    .scroll-gallery::-webkit-scrollbar {
      width: 6px;
    }
    .scroll-gallery::-webkit-scrollbar-thumb {
      background: #dfb76c;
      border-radius: 10px;
    }
    .scroll-gallery::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.2);
    }

    .scroll-gallery img {
      width: 100%;
      height: auto;
      max-height: 330px;
      object-fit: contain;
      cursor: zoom-in;
      display: block;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.5);
      background: #020202;
      transition: transform 0.3s ease;
    }
    
    .scroll-gallery img:hover {
      transform: scale(1.01);
    }

    .text-content-box {
      width: 100%;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
      font-size: 15px;
      line-height: 1.7;
      color: #e5e5e5;
      overflow-y: auto;
      background: rgba(10, 10, 10, 0.4);
      display: none;
    }

    #infoCaption {
      font-size: 13px;
      font-style: italic;
      color: #b0b0b0;
      margin-top: 10px;
      margin-bottom: 0;
      text-align: center;
    }

    .info-tabs {
      display: flex;
      margin-top: 20px;
      gap: 8px;
    }

    .tab-btn {
      flex: 1;
      background: rgba(255,255,255,0.05);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 13px;
      transition: all 0.2s ease;
      border-radius: 6px;
    }

    .tab-btn:hover {
      color: #dfb76c;
      background: rgba(255,255,255,0.1);
      border-color: rgba(223, 183, 108, 0.3);
    }

    .tab-btn.active {
      background: #dfb76c;
      color: #000;
      border-color: #dfb76c;
      box-shadow: 0 4px 15px rgba(223, 183, 108, 0.3);
    }

    /* LIGHTBOX (ΜΕΓΕΘΥΝΣΗ) */
    #imageLightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.92);
      z-index: 99999;
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    #lightboxImg {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
      box-shadow: 0 15px 40px rgba(0,0,0,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
    }

    /* MOBILE LAYOUT & RESPONSIVENESS - ΕΥΘΥΓΡΑΜΜΙΣΗ & INTRO.JPG */
    @media screen and (max-width: 768px) {
      /* Ο τίτλος έρχεται στο ίδιο ακριβώς ύψος (top: 15px) με το κουμπί αρχικής */
      #mainAppTitle {
        position: absolute;
        top: 15px; 
        left: auto;
        right: 15px;
        transform: none;
        font-size: 14px; 
        padding: 9px 16px; 
        max-width: 52%;
        border-radius: 20px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
      }
      
      /* Το κουμπί Αρχικής Άποψης - Φορτώνει το intro.jpg */
      #homeFlyBtn {
        position: absolute; 
        top: 15px; 
        left: 15px; 
        margin: 0;
        width: 38px; 
        height: 38px; 
        border-radius: 50%;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
        z-index: 1002;
        background: #111 url('intro.jpg') no-repeat center center !important;
        background-size: cover !important;
      }
      
      #homeFlyBtn:after {
        content: "" !important;
      }
      
      /* Το κουμπί Μενού τοποθετείται ακριβώς ΚΑΤΩ από το homeFlyBtn */
      #menuToggleBtn {
        position: absolute; 
        top: 65px; 
        left: 15px; 
        padding: 10px 14px; 
        font-size: 13px;
        border-radius: 8px;
        width: auto;
      }
      
      #menuContainer { 
        top: 120px; 
        left: -100%; 
        width: 90%; 
        padding: 15px; 
        max-height: 55vh; 
        border-radius: 12px;
      }
      #menuContainer.active { left: 5%; }
      
      #customInfoBox { 
        top: auto; 
        right: 0 !important; 
        bottom: -100%; 
        left: 0; 
        width: 100%; 
        max-height: 60vh; 
        border-radius: 20px 20px 0 0; 
        padding: 20px; 
        border-top: 1px solid rgba(223, 183, 108, 0.4);
      }
      #customInfoBox.active { bottom: 0; }
      
      .display-container { height: 180px; }
      .scroll-gallery img { max-height: 160px; }
      .text-content-box { font-size: 14px; padding: 15px; }
      .tab-btn { padding: 10px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <div id="splashScreen"></div>

  <h1 id="mainAppTitle">Οδοιπορικό στο Άγιο Όρος</h1>

  <button id="menuToggleBtn" onclick="toggleMenu()">🗺️ Μενού</button>
  <button id="homeFlyBtn" onclick="flyToGeneral()" title="Επιστροφή στην Αρχική Άποψη"></button>

  <div id="menuContainer">
    <button id="closeMenuBtn" onclick="toggleMenu()">&times;</button>
    <div class="menu-header">Πλοήγηση Αγίου Όρους</div>
    
    <button class="accordion-btn" onclick="toggleAccordion('monasteries-content')">🏰 Ιερές Μονές <span>▼</span></button>
    <div id="monasteries-content" class="accordion-content">
      <select id="monasterySelect" size="8">
        <option value="megistis_lavras">Ι.Μ. Μεγίστης Λαύρας</option>
        <option value="vatopediou">Ι.Μ. Βατοπαιδίου</option>
        <option value="iviron">Ι.Μ. Ιβήρων</option>
        <option value="chilandariou">Ι.Μ. Χιλανδαρίου</option>
        <option value="dionysiou">Ι.Μ. Διονυσίου</option>
        <option value="koutloumousiou">Ι.Μ. Κουτλουμουσίου</option>
        <option value="pantokratoros">Ι.Μ. Παντοκράτορος</option>
        <option value="xiropotamou">Ι.Μ. Ξηροποτάμου</option>
        <option value="zografou">Ι.Μ. Ζωγράφου</option>
        <option value="docheiariou">Ι.Μ. Δοχειαρίου</option>
        <option value="karakallou">Ι.Μ. Καρακάλλου</option>
        <option value="filotheou">Ι.Μ. Φιλοθέου</option>
        <option value="simonopetra">Ι.Μ. Σίμωνος Πέτρας</option>
        <option value="agiou_pavlou">Ι.Μ. Αγίου Παύλου</option>
        <option value="stavronikita">Ι.Μ. Σταυρονικήτα</option>
        <option value="xenofontos">Ι.Μ. Ξενοφώντος</option>
        <option value="grigoriou">Ι.Μ. Γρηγορίου</option>
        <option value="esfigmenou">Ι.Μ. Εσφιγμένου</option>
        <option value="agiou_panteleimonos">Ι.Μ. Αγίου Παντελεήμονος</option>
        <option value="konstamonitou">Ι.Μ. Κωνσταμονίτου</option>
      </select>
    </div>

    <button class="accordion-btn" onclick="toggleAccordion('skites-content')">⛪ Ιερές Σκήτες <span>▼</span></button>
    <div id="skites-content" class="accordion-content">
      <select id="skiteSelect" size="6">
        <option value="agias_annis">Σκήτη Αγίας Άννης</option>
        <option value="mikra_agia_anna">Μικρά Αγία Άννα</option>
        <option value="kafsokalyvia">Καυσοκαλύβια</option>
        <option value="provata">Σκήτη Προβάτα</option>
        <option value="agiou_dimitriou">Σκήτη Αγίου Δημητρίου</option>
        <option value="agiou_andrea">Σκήτη Αγίου Ανδρέα (Σεράι)</option>
        <option value="timiou_prodromou">Σκήτη Τιμίου Προδρόμου</option>
        <option value="profiti_ilia">Σκήτη Προφήτου Ηλιού</option>
        <option value="agias_triados">Σκήτη Αγίας Τριάδος</option>
        <option value="nea_skiti">Νέα Σκήτη</option>
        <option value="evaggelismou_xenof">Σκήτη Ευαγγελισμού (Ξενοφώντος)</option>
        <option value="agiou_panteleimonos_kout">Σκήτη Αγίου Παντελεήμονος (Κουτλουμουσίου)</option>
        <option value="evaggelismou_filoth">Σκήτη Ευαγγελισμού (Φιλοθέου)</option>
      </select>
    </div>

    <button class="accordion-btn" onclick="toggleAccordion('routes-content')">🥾 Διαδρομές Αποστολών <span>▼</span></button>
    <div id="routes-content" class="accordion-content">
      <select id="routeSelect" size="3">
        <option value="" disabled selected>-- Επιλέξτε Διαδρομή --</option>
        <option value="route1">Προσεχώς: Διαδρομή 1</option>
        <option value="route2">Προσεχώς: Διαδρομή 2</option>
      </select>
    </div>

    <div class="audio-player-container">
      <label style="color: #aaa; font-size: 11px;">Μουσική Υπόκρουση</label>
      <audio id="bgAudio" controls loop>
        <source src="ixoi/psalmwdia.mp3" type="audio/mpeg">
        Ο browser σας δεν υποστηρίζει ήχο.
      </audio>
    </div>
  </div>

  <div id="customInfoBox">
    <button id="closeBtn">&times;</button>
    <h2 id="infoTitle">Όνομα...</h2>
    
    <div class="display-container">
      <div id="galleryLayer" class="scroll-gallery"></div>
      <div id="textLayer" class="text-content-box">Φόρτωση κειμένου...</div>
    </div>
    
    <p id="infoCaption">Λεζάντα...</p>

    <div class="info-tabs">
      <button id="tabMedia" class="tab-btn active" onclick="switchTab('media')">🖼️ Φωτογραφίες</button>
      <button id="tabIstoria" class="tab-btn" onclick="switchTab('istoria')">📜 Ιστορία</button>
      <button id="tabParadosi" class="tab-btn" onclick="switchTab('paradosi')">⛪ Παράδοση</button>
    </div>
  </div>

  <div id="imageLightbox" onclick="closeLightbox()">
    <img id="lightboxImg" src="" alt="Μεγέθυνση" />
  </div>

  <div id="cesiumContainer"></div>

  <script>
    Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJhYzA1Y2NhMS1hYjhlLTRjZjUtODRmZS0zNjNhYTFmOTUwYjIiLCJpZCI6NDM5NDgxLCJpc3MiOiJodHRwczovL2FwaS5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3ODA0MTI3Nzl9.TfMTqoDjne1KkA63XMF41szdDtICT4kHVaa9QthS70Q';

    const viewer = new Cesium.Viewer('cesiumContainer', {
      terrain: Cesium.Terrain.fromWorldTerrain(),
      animation: false,
      timeline: false,
      sceneModePicker: false,
      infoBox: false,
      selectionIndicator: false,
      geocoder: false,                  
      navigationHelpButton: false,      
      baseLayerPicker: false,           
      homeButton: false                 
    });

    window.addEventListener('DOMContentLoaded', () => {
      const splash = document.getElementById('splashScreen');
      
      setTimeout(() => {
        splash.style.opacity = '0';
        
        setTimeout(() => {
          splash.style.display = 'none';
          flyToGeneral();
        }, 1500);
      }, 3000);
    });

    function toggleMenu() {
      const menu = document.getElementById('menuContainer');
      menu.classList.toggle('active');
    }

    function flyToGeneral() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
      viewer.camera.flyTo({
        destination: Cesium.Cartesian3.fromDegrees(24.340000, 40.020000, 5000), 
        orientation: { heading: Cesium.Math.toRadians(338.0), pitch: Cesium.Math.toRadians(-15.0), roll: 0.0 },
        duration: 3.5
      });
    }

    viewer.camera.setView({
      destination: Cesium.Cartesian3.fromDegrees(24.340000, 40.020000, 5000),
      orientation: { heading: Cesium.Math.toRadians(338.0), pitch: Cesium.Math.toRadians(-15.0), roll: 0.0 }
    });

    const locations = {
      "megistis_lavras": { lon: 24.382442, lat: 40.170425, height: 900, pitch: -60.0, heading: 340.0, name: "Ι.Μ. Μεγίστης Λαύρας", folder: "lavra" },
      "vatopediou": { lon: 24.212023, lat: 40.314502, height: 900, pitch: -60.0, heading: 180.0, name: "Ι.Μ. Βατοπαιδίου", folder: "vatopedi" },
      "iviron": { lon: 24.285096, lat: 40.245582, height: 900, pitch: -60.0, heading: 290.0, name: "Ι.Μ. Ιβήρων", folder: "iviron" },
      "chilandariou": { lon: 24.119725, lat: 40.334444, height: 900, pitch: -60.0, heading: 45.0, name: "Ι.Μ. Χιλανδαρίου", folder: "hiliantari" },

      "evaggelismou_filoth": { lon: 24.199945, lat: 40.252755, height: 900, pitch: -60.0, heading: 320.0, name: "Σκήτη Ευαγγελισμού (Φιλοθέου)", folder: "evagelfiloth" }

    // ΔΗΜΙΟΥΡΓΙΑ ΠΙΝΕΖΩΝ ΜΕ ΕΛΕΓΧΟ ΕΜΦΑΝΙΣΗΣ ΟΝΟΜΑΤΩΝ (DISTANCE DISPLAY CONDITION)
    for (const key in locations) {
      const loc = locations[key];
      const isSkiti = loc.name.includes("Σκήτη") || loc.name.includes("Μικρά") || loc.name.includes("Καυσοκαλύβια");
      
      // Χρυσό (#dfb76c) για Μονές, Πορφυρό / Βυζαντινό Κόκκινο (#800020) για Σκήτες
      const markerColor = isSkiti ? Cesium.Color.fromCssColorString('#800020') : Cesium.Color.fromCssColorString('#dfb76c');

      // 3 Μεγάλες Μονές (Λαύρα, Βατοπέδι, Ιβήρων) φαίνονται πάντα. Οι άλλες τοποθεσίες αποκαλύπτονται στα 18 χιλιόμετρα
      let maxVisibilityDistance = 18000.0;
      if (key === "megistis_lavras" || key === "vatopediou" || key === "iviron") {
        maxVisibilityDistance = 55000.0;
      }

      const entity = viewer.entities.add({
        position: Cesium.Cartesian3.fromDegrees(loc.lon, loc.lat, 0), 
        point: {
          pixelSize: 12,
          color: markerColor,
          outlineColor: Cesium.Color.WHITE,
          outlineWidth: 2,
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND 
        },
        label: {
          text: loc.name,
          font: '600 13px "Segoe UI", Roboto, Helvetica, Arial, sans-serif',
          style: Cesium.LabelStyle.FILL,
          fillColor: Cesium.Color.fromCssColorString('#dfb76c'), 
          showBackground: true,
          backgroundColor: new Cesium.Color(0.04, 0.04, 0.04, 0.9), 
          backgroundPadding: new Cesium.Cartesian2(10, 5), 
          verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
          pixelOffset: new Cesium.Cartesian2(0, -16),
          heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
          distanceDisplayCondition: new Cesium.DistanceDisplayCondition(0.0, maxVisibilityDistance) 
        },
        name: loc.name
      });
      entity.locationKey = key;
    }

    function flyToLocation(target) {
      const targetCenter = Cesium.Cartesian3.fromDegrees(target.lon, target.lat);
      const boundingSphere = new Cesium.BoundingSphere(targetCenter, 0.0);
      const headingRad = Cesium.Math.toRadians(target.heading);
      const pitchRad = Cesium.Math.toRadians(target.pitch);

      viewer.camera.flyToBoundingSphere(boundingSphere, {
        offset: new Cesium.HeadingPitchRange(headingRad, pitchRad, target.height),
        duration: 3.0
      });
    }

    let currentFolder = "";

    function showLocationInfo(key) {
      const data = locations[key];
      if (!data) return;

      currentFolder = data.folder;
      document.getElementById('infoTitle').innerText = data.name;

      const galleryContainer = document.getElementById('galleryLayer');
      galleryContainer.innerHTML = ""; 

      let imgIndex = 1;
      
      function tryLoadNextImage() {
        if (imgIndex > 30) return; 

        const imgSrc = `fotografies/${currentFolder}/${currentFolder}_${imgIndex}.jpg`;
        const tempImg = new Image();
        tempImg.src = imgSrc;

        tempImg.onload = function() {
          const newImg = document.createElement('img');
          newImg.src = imgSrc;
          newImg.alt = `${data.name} - Εικόνα ${imgIndex}`;
          newImg.onclick = function() { openLightbox(this); };
          
          galleryContainer.appendChild(newImg);
          
          imgIndex++;
          tryLoadNextImage(); 
        };

        tempImg.onerror = function() {
          console.log(`Φορτώθηκαν επιτυχώς ${imgIndex - 1} φωτογραφίες.`);
        };
      }

      tryLoadNextImage();
      galleryContainer.scrollTop = 0;

      switchTab('media');
      document.getElementById('customInfoBox').classList.add('active');
    }

    function switchTab(type) {
      const tabMedia = document.getElementById('tabMedia');
      const tabIstoria = document.getElementById('tabIstoria');
      const tabParadosi = document.getElementById('tabParadosi');
      
      const galleryLayer = document.getElementById('galleryLayer');
      const textLayer = document.getElementById('textLayer');
      const captionElement = document.getElementById('infoCaption');

      tabMedia.classList.remove('active');
      tabIstoria.classList.remove('active');
      tabParadosi.classList.remove('active');

      if (type === 'media') {
        tabMedia.classList.add('active');
        galleryLayer.style.display = 'flex'; 
        textLayer.style.display = 'none';    
        captionElement.innerText = "Κυλίστε κάθετα για να δείτε όλες τις φωτογραφίες";
      } 
      else {
        if (type === 'istoria') tabIstoria.classList.add('active');
        if (type === 'paradosi') tabParadosi.classList.add('active');
        
        galleryLayer.style.display = 'none'; 
        textLayer.style.display = 'block';   
        textLayer.innerText = "Φόρτωση κειμένου...";
        captionElement.innerText = (type === 'istoria') ? "Ιστορικό Σημείωμα" : "Ιερά Παράδοση & Κειμήλια";

        if (!currentFolder) return;

        const textFileUrl = `keimena/${currentFolder}/${type}.txt`;
        fetch(textFileUrl)
          .then(response => {
            if (!response.ok) throw new Error();
            return response.text();
          })
          .then(text => {
            textLayer.innerHTML = text.replace(/\n/g, "<br>");
          })
          .catch(() => {
            if (type === 'istoria') {
              textLayer.innerHTML = `Εδώ θα εμφανίζονται τα <b>ιστορικά στοιχεία</b> για την τοποθεσία: <i>${document.getElementById('infoTitle').innerText}</i>.`;
            } else {
              textLayer.innerHTML = `Εδώ θα εμφανίζονται οι <b>ιερές παραδόσεις</b> για την τοποθεσία: <i>${document.getElementById('infoTitle').innerText}</i>.`;
            }
          });
      }
    }

    function openLightbox(imgElement) {
      if (!imgElement || !imgElement.src) return;
      document.getElementById('lightboxImg').src = imgElement.src;
      document.getElementById('imageLightbox').style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('imageLightbox').style.display = 'none';
    }

    function toggleAccordion(id) {
      const contents = document.getElementsByClassName('accordion-content');
      for (let i = 0; i < contents.length; i++) {
        if (contents[i].id !== id) {
          contents[i].style.maxHeight = null; 
        }
      }
      const current = document.getElementById(id);
      if (current.style.maxHeight) {
        current.style.maxHeight = null;
      } else {
        current.style.maxHeight = current.scrollHeight + "px"; 
      }
    }

    function clearSelects() {
      document.getElementById('monasterySelect').selectedIndex = -1;
      document.getElementById('skiteSelect').selectedIndex = -1;
      document.getElementById('routeSelect').selectedIndex = -1;
    }

    document.getElementById('monasterySelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('skiteSelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    document.getElementById('skiteSelect').addEventListener('change', function() {
      if(this.value) {
        showLocationInfo(this.value);
        flyToLocation(locations[this.value]);
        document.getElementById('monasterySelect').selectedIndex = -1;
        toggleMenu(); 
      }
    });

    const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
    handler.setInputAction(function(movement) {
      const pickedObject = viewer.scene.pick(movement.position);
      if (Cesium.defined(pickedObject) && Cesium.defined(pickedObject.id)) {
        const entity = pickedObject.id;
        if (entity.locationKey) {
          showLocationInfo(entity.locationKey);
          flyToLocation(locations[entity.locationKey]);
          
          clearSelects();
          if (document.querySelector(`#monasterySelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('monasterySelect').value = entity.locationKey;
          } else if (document.querySelector(`#skiteSelect option[value="${entity.locationKey}"]`)) {
            document.getElementById('skiteSelect').value = entity.locationKey;
          }
          
          const menu = document.getElementById('menuContainer');
          if (menu.classList.contains('active')) {
            toggleMenu();
          }
        }
      }
    }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

    document.getElementById('closeBtn').addEventListener('click', function() {
      document.getElementById('customInfoBox').classList.remove('active');
      clearSelects();
    });
  </script>
